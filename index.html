<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Potter: A Wizarding Life</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1410;--ink2:#3d3028;--ink3:#7a6a5e;
  --parch:#f7f2e8;--parch2:#efe8d5;--parch3:#e5d9c0;--parch4:#d8c9a8;
  --gold:#c9972a;--gold2:#e8b84b;--gold3:#f5d070;
  --gryf:#8b1a1a;--slyth:#1a4a2e;--raven:#1a2a4a;--huff:#5a4a00;
  --border:#c4a882;--border2:#a08060;
  --dark:#0d0806;--dark2:#1a0f08;--dark3:#2a1810;
  --magic:#6a0dad;--magic2:#9b30ff;
  --danger:#c0392b;--success:#1a5c2e;
  --hp-red:#ae0001;--hp-gold:#d3a625;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background:#0d0806;
  min-height:100vh;
  font-family:'EB Garamond',Georgia,serif;
  overflow-x:hidden;
  cursor:default;
}

/* ── STARFIELD ── */
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--lo,.1);transform:scale(1)}50%{opacity:var(--hi,.9);transform:scale(1.3)}}

/* ── FLOATING PARTICLES ── */
.particle{position:fixed;pointer-events:none;animation:float-up var(--dur,4s) ease-out forwards;font-size:var(--sz,14px);z-index:1}
@keyframes float-up{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-120px) rotate(360deg);opacity:0}}

/* ── MAIN LAYOUT ── */
#app{
  position:relative;z-index:2;
  width:100%;max-width:800px;
  margin:0 auto;
  padding:1.5rem 1rem 4rem;
  min-height:100vh;
}

/* ── MENU SCREEN ── */
.menu-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem 1rem;
}
.menu-logo{
  font-family:'Cinzel',serif;font-size:clamp(28px,6vw,52px);font-weight:700;
  background:linear-gradient(135deg,#c9972a,#f5d070,#c9972a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;letter-spacing:.05em;line-height:1.2;margin-bottom:.5rem;
  animation:shimmer 3s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.menu-sub{font-family:'Cinzel',serif;font-size:clamp(11px,2vw,14px);letter-spacing:.3em;text-transform:uppercase;color:#8a7060;margin-bottom:3rem}
.menu-crest{font-size:80px;margin-bottom:1.5rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.menu-btn{
  display:block;width:100%;max-width:320px;margin:.5rem auto;
  padding:1rem 2rem;
  font-family:'Cinzel',serif;font-size:15px;font-weight:600;letter-spacing:.12em;
  border:1px solid var(--gold);border-radius:4px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.menu-btn-primary{background:linear-gradient(135deg,#8b1a1a,#c9972a);color:#fff8e8}
.menu-btn-secondary{background:transparent;color:var(--gold)}
.menu-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,151,42,.3)}
.menu-btn:active{transform:translateY(0)}

/* ── PAGE ── */
.page{
  background:linear-gradient(160deg,var(--parch) 0%,var(--parch2) 100%);
  border:1px solid var(--border);border-radius:6px;
  padding:2rem 1.75rem;margin-bottom:1rem;
  position:relative;overflow:hidden;
  box-shadow:0 4px 30px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.3);
  animation:pageIn .35s ease;
}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.page::before{content:'';position:absolute;top:7px;left:7px;right:7px;bottom:7px;border:.5px solid var(--border2);pointer-events:none;border-radius:4px}
.page::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* ── TYPOGRAPHY ── */
.eyebrow{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink3);margin-bottom:.35rem}
.title{font-family:'Cinzel',serif;font-size:clamp(17px,3vw,22px);font-weight:600;color:var(--ink);margin-bottom:1.25rem;line-height:1.3;border-bottom:1px solid var(--border);padding-bottom:.65rem}
.prose{font-size:16px;line-height:2;color:var(--ink);margin-bottom:1rem}
.prose em{font-style:italic}.prose strong{font-weight:600;color:#2a1a10}
.scene-break{text-align:center;color:var(--ink3);margin:1.2rem 0;letter-spacing:.3em;font-size:13px}

/* ── DIALOGUE ── */
.dlg{
  background:var(--parch2);border:1px solid var(--border);
  border-left:3px solid var(--gold);border-radius:0 4px 4px 0;
  padding:.75rem 1rem;margin:.85rem 0;font-size:15px;line-height:1.8;
  color:var(--ink);font-style:italic;
}
.dlg-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-style:normal;display:block;margin-bottom:3px}

/* ── CHOICES ── */
.q-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin:.9rem 0 .3rem}
.q-text{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:.65rem;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:1rem}
.choice{
  background:var(--parch2);border:1px solid var(--border);border-radius:4px;
  padding:.7rem 1rem;font-family:'EB Garamond',serif;font-size:15px;
  color:var(--ink);cursor:pointer;text-align:left;line-height:1.6;
  transition:all .18s;width:100%;position:relative;overflow:hidden;
}
.choice::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(201,151,42,.15),transparent);transition:width .3s}
.choice:hover{border-color:var(--gold);transform:translateX(3px)}
.choice:hover::before{width:100%}
.choice:active{transform:scale(.99)}
.choice-letter{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:var(--gold);display:block;margin-bottom:2px;letter-spacing:.05em}

/* ── HUD ── */
.hud{
  background:linear-gradient(135deg,#100a06,#1e1208);
  border:1px solid #3a2810;border-radius:6px;
  padding:1rem 1.25rem;margin-bottom:1rem;
  box-shadow:0 2px 20px rgba(0,0,0,.5);
}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;flex-wrap:wrap;gap:.5rem}
.hud-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold2);letter-spacing:.05em}
.hud-meta{font-size:12px;color:#8a7060;display:flex;gap:.75rem;flex-wrap:wrap}
.hud-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem 1.5rem}
.stat-row{display:flex;align-items:center;gap:7px}
.stat-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;color:#a08060;width:68px;flex-shrink:0}
.stat-track{flex:1;height:5px;background:#2a1a10;border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .6s ease;position:relative}
.stat-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:rgba(255,255,255,.4);border-radius:2px}
.stat-val{font-family:'Cinzel',serif;font-size:10px;color:#8a7060;width:22px;text-align:right;flex-shrink:0}
.hud-badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem}

/* ── BADGES ── */
.badge{display:inline-block;font-family:'Cinzel',serif;font-size:10px;font-weight:600;padding:2px 9px;border-radius:20px;letter-spacing:.05em}
.badge-gryf{background:var(--gryf);color:#ffd700;border:1px solid #c04040}
.badge-gold{background:linear-gradient(90deg,#8b6914,#c9972a);color:#fff8e8}
.badge-purple{background:#3a1a5a;color:#c090ff;border:1px solid #6a2aaa}
.badge-green{background:#1a3a1a;color:#60c060;border:1px solid #2a6a2a}
.badge-dark{background:#1a1a2a;color:#a0b0ff;border:1px solid #3a3a6a}

/* ── RELATIONSHIP PANEL ── */
.rel-panel{background:var(--parch2);border:1px solid var(--border);border-radius:4px;padding:.85rem;margin-bottom:1rem}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;margin-top:.5rem}
.rel-card{background:var(--parch);border:1px solid var(--border);border-radius:4px;padding:.5rem .7rem;transition:all .15s;cursor:default}
.rel-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.rel-name{font-family:'Cinzel',serif;font-size:10px;color:var(--ink2);margin-bottom:4px}
.rel-bar-track{height:4px;background:var(--parch3);border-radius:2px;overflow:hidden;margin-bottom:3px}
.rel-bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.rel-status{font-size:11px;color:var(--ink3);font-style:italic}

/* ── PROGRESS ── */
.prog-bar{display:flex;gap:3px;margin-bottom:1.25rem}
.prog-seg{height:4px;flex:1;background:var(--parch3);border-radius:2px;transition:background .3s}
.prog-done{background:var(--gold)}
.prog-cur{background:var(--gold3);animation:pulse-bar 1.5s ease-in-out infinite}
@keyframes pulse-bar{0%,100%{opacity:1}50%{opacity:.6}}

/* ── BUTTONS ── */
.btn{background:var(--ink);color:var(--parch);border:none;border-radius:4px;padding:.65rem 1.5rem;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;cursor:pointer;transition:all .18s}
.btn:hover{background:var(--ink2);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,#8b6914,#c9972a);color:#fff8e8;border:1px solid #e8b84b}
.btn-gold:hover{background:linear-gradient(135deg,#a07820,#e8b84b)}
.btn-wide{width:100%;padding:.8rem;margin-top:.75rem}
.btn-red{background:var(--gryf);color:#ffd700;border:1px solid #c04040}

/* ── NOTIFICATION ── */
.notif{
  position:fixed;top:1.25rem;right:1.25rem;z-index:9999;
  background:linear-gradient(135deg,#1a0f08,#2a1810);
  color:var(--gold2);border:1px solid var(--gold);border-radius:6px;
  padding:.65rem 1.1rem;font-family:'EB Garamond',serif;font-size:14px;
  max-width:280px;line-height:1.5;
  animation:notifIn .3s ease,notifOut .3s ease 2.8s forwards;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  pointer-events:none;
}
@keyframes notifIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
@keyframes notifOut{to{transform:translateX(120%);opacity:0}}

/* ── ACHIEVEMENT POPUP ── */
.ach-popup{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;
  background:linear-gradient(135deg,#2a1a00,#4a3000);
  border:2px solid var(--gold);border-radius:8px;
  padding:.85rem 1.5rem;font-family:'EB Garamond',serif;
  text-align:center;min-width:260px;
  animation:achIn .4s cubic-bezier(.34,1.56,.64,1),achOut .3s ease 3.5s forwards;
  box-shadow:0 0 40px rgba(201,151,42,.4);
}
@keyframes achIn{from{transform:translateX(-50%) translateY(80px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes achOut{to{transform:translateX(-50%) translateY(80px);opacity:0}}
.ach-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:var(--gold3);text-transform:uppercase}
.ach-name{font-size:17px;color:#fff8e8;margin:.2rem 0}
.ach-desc{font-size:13px;color:#c0a060;font-style:italic}

/* ── LOG ── */
.log-panel{border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:1rem}
.log-header{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);padding:.4rem .85rem;background:var(--parch2);border-bottom:1px solid var(--border)}
.log-entry{padding:6px .85rem;border-bottom:1px solid var(--border);display:flex;gap:10px;font-size:13px;color:var(--ink2);line-height:1.5}
.log-entry:last-child{border-bottom:none}
.log-age{font-family:'Cinzel',serif;font-size:10px;color:var(--ink3);flex-shrink:0;min-width:42px}

/* ── REVEAL ── */
.reveal-box{text-align:center;padding:1.5rem 1rem;margin:1rem 0}
.reveal-big{font-family:'Cinzel',serif;font-size:clamp(28px,6vw,44px);font-weight:700;display:block;margin:.5rem 0;animation:revealAnim .6s ease}
@keyframes revealAnim{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

/* ── SPELL LIST ── */
.spell-list{display:flex;flex-wrap:wrap;gap:5px;margin:.5rem 0}
.spell{background:var(--parch3);border:1px solid var(--border2);border-radius:20px;padding:2px 11px;font-size:12px;font-style:italic;color:var(--ink2)}

/* ── ACTION RESULT ── */
.result-box{
  background:var(--parch2);border:1px solid var(--border);
  border-left:3px solid var(--gold2);border-radius:0 4px 4px 0;
  padding:.7rem 1rem;margin:.75rem 0;font-size:14px;line-height:1.65;color:var(--ink2);
}

/* ── HOUSE POINTS BAR ── */
.hp-bar-container{margin:1rem 0}
.hp-bar-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:.4rem;display:flex;justify-content:space-between}
.hp-bars{display:flex;gap:4px;height:20px}
.hp-bar{flex:1;border-radius:3px;transition:flex .8s ease;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hp-bar span{font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:rgba(255,255,255,.9);text-shadow:0 1px 2px rgba(0,0,0,.5);z-index:1}
.hp-gryf{background:linear-gradient(90deg,#6b1010,#8b1a1a)}
.hp-slyth{background:linear-gradient(90deg,#0d3020,#1a4a2e)}
.hp-raven{background:linear-gradient(90deg,#0d1830,#1a2a4a)}
.hp-huff{background:linear-gradient(90deg,#3a3000,#5a4a00)}

/* ══════════════════════════════════════
   MINIGAME STYLES
══════════════════════════════════════ */
.minigame-wrapper{
  background:linear-gradient(160deg,#0d0806,#1a0f08);
  border:2px solid var(--gold);border-radius:8px;
  padding:1.5rem;margin:.75rem 0;
  box-shadow:0 0 30px rgba(201,151,42,.2),inset 0 0 60px rgba(0,0,0,.5);
}
.mg-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold2);text-align:center;margin-bottom:.3rem}
.mg-sub{font-size:14px;color:#8a7060;text-align:center;margin-bottom:1.25rem;font-style:italic}
.mg-timer-bar{height:6px;background:#2a1810;border-radius:3px;overflow:hidden;margin-bottom:1rem}
.mg-timer-fill{height:100%;background:linear-gradient(90deg,var(--gryf),var(--gold2));border-radius:3px;transition:width .1s linear}
.mg-score{font-family:'Cinzel',serif;font-size:13px;color:var(--gold3);text-align:center;margin-bottom:1rem}

/* Quidditch */
#quidditch-canvas{
  display:block;margin:0 auto;border-radius:8px;
  border:1px solid #3a2810;cursor:crosshair;
  background:radial-gradient(ellipse at center,#1a3a1a 0%,#0d200d 100%);
  box-shadow:inset 0 0 40px rgba(0,0,0,.5);
}
.quid-instruction{font-size:13px;color:#8a7060;text-align:center;margin-top:.5rem;font-style:italic}

/* Potions */
.potion-cauldron{
  width:120px;height:100px;margin:0 auto 1rem;
  background:radial-gradient(ellipse,#1a1a2a,#0d0d15);
  border:3px solid #4a4060;border-radius:10px 10px 40% 40%;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;position:relative;overflow:hidden;
}
.potion-bubbles{position:absolute;bottom:0;left:0;right:0;height:20px;background:rgba(106,13,173,.3);animation:bubble 1s ease-in-out infinite}
@keyframes bubble{0%,100%{height:15px}50%{height:25px}}
.ingredients-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.ingredient-btn{
  background:var(--parch2);border:2px solid var(--border);border-radius:6px;
  padding:.6rem .4rem;cursor:pointer;text-align:center;transition:all .2s;font-family:'EB Garamond',serif;
}
.ingredient-btn:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.ingredient-btn.selected{border-color:#6a0dad;background:#2a1040;color:#c090ff}
.ingredient-btn.correct{border-color:#1a6a1a;background:#0d2a0d;animation:correctPulse .4s ease}
.ingredient-btn.wrong{border-color:#6a1a1a;background:#2a0d0d;animation:wrongShake .3s ease}
@keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.ingredient-icon{font-size:24px;display:block;margin-bottom:3px}
.ingredient-name{font-size:11px;color:var(--ink3)}
.recipe-display{background:rgba(0,0,0,.2);border-radius:4px;padding:.5rem .75rem;margin-bottom:1rem;font-size:13px;color:var(--gold2);text-align:center}

/* Duelling */
.duel-arena{
  display:flex;justify-content:space-between;align-items:center;
  background:radial-gradient(ellipse,#1a0a0a,#0d0606);
  border-radius:8px;padding:1rem;margin-bottom:1rem;
  border:1px solid #3a1010;min-height:80px;
}
.duel-hp{text-align:center;flex:1}
.duel-hp-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold2);margin-bottom:.3rem}
.duel-hp-bar{height:8px;border-radius:4px;overflow:hidden;background:#2a0808;width:80px;margin:0 auto}
.duel-hp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#c00,#e04040);transition:width .4s ease}
.duel-vs{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold);text-shadow:0 0 10px var(--gold)}
.duel-spell-display{
  background:rgba(106,13,173,.2);border:1px solid #6a0dad;border-radius:6px;
  padding:.75rem;text-align:center;margin-bottom:1rem;
}
.opponent-casting{font-size:13px;color:#c090ff;margin-bottom:.3rem;font-style:italic}
.opponent-spell{font-family:'Cinzel',serif;font-size:20px;color:#e0b0ff;font-weight:600;animation:spellReveal .3s ease}
@keyframes spellReveal{from{transform:scale(1.5);opacity:0}to{transform:scale(1);opacity:1}}
.counter-spells{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.counter-btn{
  background:linear-gradient(135deg,#1a0a30,#2a1050);border:1px solid #5a2a90;
  border-radius:6px;padding:.6rem;cursor:pointer;text-align:center;
  font-family:'Cinzel',serif;font-size:12px;color:#c090ff;
  transition:all .2s;
}
.counter-btn:hover{border-color:var(--magic2);background:linear-gradient(135deg,#2a1050,#3a1870);transform:translateY(-2px)}
.counter-btn.correct-answer{border-color:#1a9a1a;background:linear-gradient(135deg,#0d2a0d,#1a4a1a)}
.counter-btn.wrong-answer{border-color:#9a1a1a;background:linear-gradient(135deg,#2a0d0d,#4a1a1a)}

/* OWLs exam */
.exam-q{font-size:15px;color:var(--ink);margin-bottom:1rem;line-height:1.6;font-weight:500}
.exam-choices{display:flex;flex-direction:column;gap:7px;margin-bottom:1rem}
.exam-btn{
  background:var(--parch2);border:1px solid var(--border);border-radius:4px;
  padding:.6rem .9rem;cursor:pointer;text-align:left;font-family:'EB Garamond',serif;font-size:14px;
  color:var(--ink);transition:all .15s;
}
.exam-btn:hover{border-color:var(--gold);background:var(--parch3)}
.exam-btn.correct{background:#d4edda;border-color:#1a6a1a;color:#0d3a0d}
.exam-btn.wrong{background:#f8d7da;border-color:#6a1a1a;color:#3a0d0d}
.exam-progress{font-family:'Cinzel',serif;font-size:11px;color:var(--ink3);text-align:center;margin-bottom:.75rem}
.grade-display{font-family:'Cinzel',serif;font-size:48px;font-weight:700;text-align:center;display:block;margin:.5rem 0;animation:revealAnim .5s ease}

/* ── FINAL SCORE ── */
.score-screen{text-align:center;padding:1rem 0}
.score-ring{
  width:140px;height:140px;border-radius:50%;margin:0 auto 1rem;
  background:conic-gradient(var(--gold) 0%,var(--gold) var(--pct),#2a1810 var(--pct));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(201,151,42,.3);

  try{
    const ac=getAudio();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime+delay);

    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+delay+dur);

  }catch(e){}
}

function getMastery(spell){const xp=G.spellXP[spell]||0;let lv=MASTERY_LEVELS[0];for(const l of MASTERY_LEVELS)if(xp>=l.min)lv=l;return{xp,...lv};}
function gainXP(spell,amt){
  if(!G.spellXP[spell])G.spellXP[spell]=0;
  const old=getMastery(spell);
  G.spellXP[spell]=cl(G.spellXP[spell]+amt,0,100);
  const nw=getMastery(spell);
  if(old.lbl!==nw.lbl){notify(`${spell} → ${nw.lbl}!`,'⚡');SFX.spell();for(let i=0;i<5;i++)setTimeout(()=>spawnParticle(Math.random()*window.innerWidth,100+Math.random()*200,'⭐'),i*100);}
}
function calcDmg(spell){const xp=G.spellXP[spell]||0;const{mult}=getMastery(spell);const wp=0.5+G.wandPower/200;return Math.round(30*mult*wp);}

function hasFlag(k){return!!G.flags[k];}

/* ── LOCKED / UNLOCKED CHOICE SYSTEM ── */
// Choice format: {text, sub, req:{stat:min}, reqFlag, bonus, lock}
// OR just a plain string for simple choices
function ch(arr,fn,q){
  const letters='ABCDEFGH';
  const rows=arr.map((c,i)=>{
    // Plain string = simple unlocked choice
    if(typeof c==='string'){
      const[main,sub]=c.split('|');
      return`<button class="choice" onclick="${fn}(${i});SFX.click()">
        <span class="choice-key">${letters[i]}</span>${main}
        ${sub?`<small>${sub}</small>`:''}
      </button>`;
    }
    // Object = potentially locked choice
    const{text,sub,req,reqFlag,bonus,lock,bonusFlag}=c;
    // Check requirements
    let locked=false;let lockMsg='';
    if(req){
      for(const[stat,min]of Object.entries(req)){
        const cur=(G.stats&&G.stats[stat])||0;
        if(cur<min){locked=true;lockMsg=`Requires ${stat.charAt(0).toUpperCase()+stat.slice(1)} ${min} (you have ${cur})`;}
      }
    }
    if(reqFlag&&!hasFlag(reqFlag)){locked=true;lockMsg=`Locked — requires a choice made earlier`;}
    if(lock){locked=true;lockMsg=lock;}

    const isBonus=bonusFlag&&hasFlag(bonusFlag);
    if(locked){
      return`<div class="choice locked">
        <span class="choice-key">${letters[i]} <span class="lock-icon">🔒</span></span>${text}
        ${sub?`<small style="color:#5a3820">${sub}</small>`:''}
        <span class="lock-reason">🔒 ${lockMsg}</span>
      </div>`;
    }
    return`<button class="choice ${isBonus?'unlocked-bonus':''}" onclick="${fn}(${i});SFX.click()">
      <span class="choice-key">${letters[i]}</span>${text}
      ${sub?`<small>${sub}</small>`:''}
      ${bonus?`<small style="color:#7a9a40">${bonus}</small>`:''}
    </button>`;
  }).join('');

  return`<div class="choices-header">Your Choice</div>
  ${q?`<p style="font-size:14.5px;color:var(--ink);margin-bottom:.5rem;line-height:1.5;font-weight:500">${q}</p>`:''}
  <div class="choices">${rows}</div>`;
}

let quidState={};
function startQuidditch(onWin,onLose){
  const W=Math.min(360,window.innerWidth-80),H=220;
  quidState={
    snitch:{x:W/2,y:H/2,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,angle:0},
    timer:20,catches:0,needed:1,w:W,h:H,interval:null,timerInterval:null,
    onWin,onLose,active:true
  };

  pg(`Year ${G.year} — Quidditch`,'🧹 Catch the Golden Snitch!',
    `${hud()}
    <div class="minigame-wrapper">
      <div class="mg-title">⚡ Quidditch Match</div>
      <div class="mg-sub">Click the Golden Snitch before time runs out!</div>
      <div class="mg-timer-bar"><div id="quid-timer" class="mg-timer-fill" style="width:100%"></div></div>
      <div class="mg-score" id="quid-score">Catches: 0 / ${quidState.needed} | Time: 20s</div>
      <canvas id="quidditch-canvas" width="${W}" height="${H}"></canvas>
      <div class="quid-instruction">🦅 Your Patronus watches from the stands. Catch it!</div>
    </div>`
  );

  const canvas=$('quidditch-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');

  function drawField(){
    ctx.clearRect(0,0,W,H);
    // Pitch lines
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
    for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(i*W/4,0);ctx.lineTo(i*W/4,H);ctx.stroke();}
    for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(0,i*H/4);ctx.lineTo(W,i*H/4);ctx.stroke();}
    // Center circle
    ctx.beginPath();ctx.arc(W/2,H/2,40,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.08)';ctx.stroke();

    // Snitch
    const s=quidState.snitch;
    // Glow
    const grd=ctx.createRadialGradient(s.x,s.y,2,s.x,s.y,20);
    grd.addColorStop(0,'rgba(255,220,0,.6)');grd.addColorStop(1,'rgba(255,220,0,0)');
    ctx.beginPath();ctx.arc(s.x,s.y,20,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    // Body
    ctx.beginPath();ctx.arc(s.x,s.y,10,0,Math.PI*2);
    ctx.fillStyle='#ffd700';ctx.fill();
    ctx.strokeStyle='#c9972a';ctx.lineWidth=1.5;ctx.stroke();
    // Wings
    s.angle+=.05;
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(Math.sin(s.angle)*.3);
    ctx.beginPath();ctx.ellipse(-16,0,14,5,-.3,0,Math.PI*2);ctx.fillStyle='rgba(255,220,100,.6)';ctx.fill();
    ctx.beginPath();ctx.ellipse(16,0,14,5,.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Eyes
    ctx.beginPath();ctx.arc(s.x+3,s.y-2,2,0,Math.PI*2);ctx.fillStyle='#2a1a00';ctx.fill();
  }

  function moveSnitech(){
    const s=quidState.snitch;
    // Erratic movement
    s.vx+=(Math.random()-.5)*.4;s.vy+=(Math.random()-.5)*.4;
    const maxSpeed=4+G.year*.3;
    const speed=Math.sqrt(s.vx*s.vx+s.vy*s.vy);
    if(speed>maxSpeed){s.vx=s.vx/speed*maxSpeed;s.vy=s.vy/speed*maxSpeed;}
    s.x+=s.vx;s.y+=s.vy;
    if(s.x<15){s.x=15;s.vx=Math.abs(s.vx);}
    if(s.x>W-15){s.x=W-15;s.vx=-Math.abs(s.vx);}
    if(s.y<15){s.y=15;s.vy=Math.abs(s.vy);}
    if(s.y>H-15){s.y=H-15;s.vy=-Math.abs(s.vy);}
    drawField();
  }

  quidState.interval=setInterval(moveSnitech,40);
  quidState.timerInterval=setInterval(()=>{
    quidState.timer--;
    const tb=$('quid-timer');const sc=$('quid-score');
    if(tb)tb.style.width=(quidState.timer/20*100)+'%';
    if(sc)sc.textContent=`Catches: ${quidState.catches} / ${quidState.needed} | Time: ${quidState.timer}s`;
    if(quidState.timer<=0&&quidState.active){
      quidState.active=false;
      clearInterval(quidState.interval);clearInterval(quidState.timerInterval);
      if(quidState.catches>=quidState.needed)quidState.onWin();else quidState.onLose();
    }
  },1000);

  canvas.addEventListener('click',function(e){
    if(!quidState.active)return;
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    const s=quidState.snitch;
    const dist=Math.sqrt((cx-s.x)**2+(cy-s.y)**2);
    if(dist<22){
      quidState.catches++;
      SFX.snitch();
      // Burst particles
      for(let i=0;i<6;i++)spawnParticle(e.clientX+Math.random()*40-20,e.clientY+Math.random()*40-20,'⭐');
      const sc=$('quid-score');if(sc)sc.textContent=`Catches: ${quidState.catches} / ${quidState.needed} | Time: ${quidState.timer}s`;
      s.vx=(Math.random()-.5)*6;s.vy=(Math.random()-.5)*6;
      if(quidState.catches>=quidState.needed&&quidState.active){
        quidState.active=false;
        clearInterval(quidState.interval);clearInterval(quidState.timerInterval);
        setTimeout(()=>quidState.onWin(),400);
      }
    }
  });
  drawField();
}

function addIngredient(i){
  if(!potionState.active)return;
  const ing=potionState.shuffled[i];
  potionState.selected.push(ing);
  SFX.potion();

  const expectedIdx=potionState.selected.length-1;
  const btn=$(`ing-${i}`);

  if(potionState.recipe.ingredients[expectedIdx]===ing){
    if(btn){btn.classList.add('correct');btn.disabled=true;}
    if(potionState.selected.length===potionState.recipe.ingredients.length){
      potionState.active=false;clearInterval(potionState.interval);
      SFX.success();
      for(let j=0;j<8;j++)setTimeout(()=>spawnParticle(window.innerWidth/2+Math.random()*100-50,window.innerHeight/2+Math.random()*60-30,'✨'),j*100);
      setTimeout(()=>potionState.onWin(),800);
    }

      <strong style="font-family:'Cinzel',serif;font-size:10px;color:#f5d070">${s}</strong>${isSuper?' ✦':''}
      <span style="display:block;font-size:10px;color:#8a6040">${lbl} · ~${dmg} dmg</span>
    </button>`;
  }).join('');

  pg(`Year ${G.year} — ${DS.context}`,`⚡ Duel: Harry vs ${DS.opponent}`,
    `${hud()}
    <div class="minigame-wrapper" style="background:radial-gradient(ellipse,#1a0808,#060304)">
      <div style="font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#e04040;text-align:center;margin-bottom:.65rem;letter-spacing:.1em">— DUEL — Round ${DS.round}/${DS.maxRounds} —</div>
      <div class="duel-arena">
        <div class="duel-hp">
          <div class="duel-hp-name">Harry Potter</div>
          <div class="duel-hp-bar"><div class="duel-hp-fill" style="width:${DS.harryHP}%;background:linear-gradient(90deg,#c0392b,#e74c3c);transition:width .4s"></div></div>

function toggleSpells(){const p=$('spell-picker');if(p)p.style.display=p.style.display==='none'?'block':'none';}

function duelAttack(spell){
  clearTimeout(DS._t);if(!DS.active)return;
  gainXP(spell,rnd([4,5,6,7]));growWand(1);
  const dmg=calcDmg(spell);
  const isWeak=DS.data.weakTo===spell;
  const finalDmg=isWeak?Math.round(dmg*2):dmg;
  DS.enemyHP=Math.max(0,DS.enemyHP-finalDmg);
  DS.log.push({t:'h',msg:`⚔️ ${spell} hits for ${finalDmg}${isWeak?' (SUPER EFFECTIVE!)':''}!`});
  SFX.spell();
  for(let i=0;i<3;i++)spawnParticle(window.innerWidth*.6+Math.random()*60,window.innerHeight*.35,'⚡');
  if(DS.enemyHP<=0&&DS.active){DS.active=false;clearTimeout(DS._t);setTimeout(()=>duelWin(),600);return;}
  applyEnemyHit(DS.data.atk,false,true);
}

function duelAction(type){
  clearTimeout(DS._t);if(!DS.active)return;
  if(type==='shield'){
    gainXP('Protego',4);SFX.spell();
    DS.log.push({t:'h',msg:'🛡️ Protego! Shield raised!'});
    applyEnemyHit(DS.data.atk,true,true);
  }else if(type==='dodge'){
    SFX.spell();
    if(Math.random()<0.55){DS.log.push({t:'h',msg:'💨 Evaded completely!'});for(let i=0;i<2;i++)spawnParticle(window.innerWidth*.3,window.innerHeight*.35,'💫');nextDuelRound();}
    else{DS.log.push({t:'s',msg:'💨 Dodge failed — full hit!'});applyEnemyHit(DS.data.atk,false,true);}
    return;
  }else if(type==='heal'){
    if(DS.heals<=0)return;
    DS.heals--;DS.harryHP=Math.min(100,DS.harryHP+25);
    SFX.spell();DS.log.push({t:'h',msg:`💊 Healed +25 HP! (${DS.heals} left)`});
    applyEnemyHit(DS.data.atk,false,true);
  }
}

function applyEnemyHit(base,shielded,advance){
  const reduced=shielded?Math.round(base*.3):base;
  const final=Math.max(1,Math.round(reduced*DS.data.diff));
  DS.harryHP=Math.max(0,DS.harryHP-final);
  if(final>0){DS.log.push({t:'e',msg:`💥 ${DS.curSpell} hits for ${final}${shielded?' (reduced)':''}!`});SFX.fail();}
  if(DS.harryHP<=0&&DS.active){DS.active=false;clearTimeout(DS._t);setTimeout(()=>duelLose(),500);return;}
  if(advance)nextDuelRound();
}

function nextDuelRound(){
  DS.round++;
  if(DS.round>DS.maxRounds&&DS.active){DS.active=false;clearTimeout(DS._t);setTimeout(()=>DS.harryHP>DS.enemyHP?duelWin():duelLose(),400);return;}
  setTimeout(()=>renderDuel(),600);
}

function duelWin(){
  G.duelWins++;growWand(rnd([4,6,8]));SFX.success();checkAchievements();
  for(let i=0;i<8;i++)setTimeout(()=>spawnParticle(Math.random()*window.innerWidth,Math.random()*window.innerHeight*.5,'⭐'),i*120);
  DS.onWin();
}
function duelLose(){SFX.fail();DS.onLose();}

  {q:"What is the name of Dumbledore's phoenix?",a:["Fawkes","Hedwig","Buckbeak","Norbert"],correct:0},
];

let owlState={};
function startOWLs(subject,onComplete){
  const questions=[...OWL_QUESTIONS].sort(()=>Math.random()-.5).slice(0,7);
  owlState={questions,current:0,score:0,subject,onComplete,answered:false};
  renderOWLQuestion();
}

function renderOWLQuestion(){
  const{questions,current,score,subject}=owlState;
  if(current>=questions.length){
    // Grade
    const pct=score/questions.length;
    let grade,color;
    if(pct>=.9){grade='O (Outstanding)';color='#ffd700';}
    else if(pct>=.8){grade='E (Exceeds Expectations)';color='#60c060';}
    else if(pct>=.7){grade='A (Acceptable)';color='#6090c0';}
    else if(pct>=.6){grade='P (Poor)';color='#c08030';}
    else if(pct>=.5){grade='D (Dreadful)';color='#c04040';}
    else{grade='T (Troll)';color='#8a4040';}
    G.owlGrades[subject]=grade.charAt(0);
    if(grade.charAt(0)==='O')unlockAchievement('owl_student');
    SFX.success();
    pg(`O.W.L. Results — ${subject}`,`📜 Your Grade`,
      `${hud()}
      <div class="reveal-box">
        <p class="prose" style="font-style:italic;color:var(--ink3)">Professor Marchbanks reviews your paper...</p>
        <span class="grade-display" style="color:${color}">${grade.charAt(0)}</span>
        <p style="font-family:'Cinzel',serif;font-size:14px;color:var(--ink2);margin-bottom:.5rem">${grade}</p>
        <p class="prose">${score} out of ${questions.length} correct.</p>
      </div>
      <button class="btn btn-gold btn-wide" onclick="owlState.onComplete('${grade.charAt(0)}')">Continue →</button>`
    );
    return;
  }

  const q=questions[current];
  const shuffled=q.a.map((a,i)=>({a,correct:i===q.correct})).sort(()=>Math.random()-.5);

  pg(`Year 5 — O.W.L. Exams`,`📜 ${subject} Examination`,
    `${hud()}
    <div class="page" style="margin-bottom:0;box-shadow:none">
      <div class="exam-progress">Question ${current+1} of ${questions.length} | Score: ${score}</div>
      <div class="mg-timer-bar" style="margin-bottom:1rem"><div class="mg-timer-fill" style="width:${((questions.length-current)/questions.length*100)}%"></div></div>
      <p class="exam-q">${q.q}</p>
      <div class="exam-choices">
        ${shuffled.map((opt,i)=>`<button class="exam-btn" id="exam-${i}" onclick="answerOWL(${i},${opt.correct})">${opt.a}</button>`).join('')}
      </div>
    </div>`
  );
}

function answerOWL(idx,correct){
  // Disable all
  document.querySelectorAll('.exam-btn').forEach(b=>b.disabled=true);
  const btn=$(`exam-${idx}`);
  if(correct){
    if(btn)btn.classList.add('correct');
    owlState.score++;SFX.success();
  }else{
    if(btn)btn.classList.add('wrong');
    // Show correct
    document.querySelectorAll('.exam-btn').forEach((b,i)=>{if(b.textContent===OWL_QUESTIONS.find(q=>q)?.a[0])b.classList.add('correct');});
    SFX.fail();
  }
  owlState.current++;
  setTimeout(()=>renderOWLQuestion(),900);
}

    <div class="ft-grid">

        return`<button class="ft-btn ${used?'used':''}" onclick="doFT('${k}','${nextFn}',${actionsLeft})">
          <span class="ft-icon">${a.icon}</span>
          <span class="ft-name">${a.name}</span>
          <span class="ft-desc">${a.desc}</span>
        </button>`;
      }).join('')}
    </div>
    ${actionsLeft===0?`<button class="btn btn-gold btn-wide" onclick="${nextFn}()">Continue the story →</button>`:''}

function doFT(key,nextFn,actionsLeft){
  if(G.ftUsed.includes(key))return;
  G.ftUsed.push(key);
  FT_ACTIVITIES[key].fn();
  checkAchievements();saveGame();
  const remaining=actionsLeft-1;
  renderFreeTime(nextFn,remaining);
}

      'You said her name first. Just her name. She seemed to like that.',
      'She reached up and kissed you. The noise of the common room became a very distant sound.',
    ],'chooseGinny6','What happens?')}`)
}
function chooseGinny6(i){
  const d=[
    {rel:{ginny:25},stats:{courage:12,loyalty:10},log:'Year 6: kissed Ginny after the Quidditch Cup. The common room noticed.'},

    {rel:{ginny:30},stats:{loyalty:12,courage:8},log:'Year 6: said her name first. She smiled. Then kissed you.'},

function phaseDumbledoreTower(){

    `${hud()}
    ${relPanel(['dumbledore','draco','snape','ginny'])}
    <p class="prose">The Astronomy Tower. The Dark Mark over Hogwarts. Dumbledore, weakened from the cave, asking you to fetch Snape. Draco Malfoy, stepping from the shadows, wand levelled — shaking. Not going to do it.</p>

    <p class="prose">Snape arrived. The other Death Eaters arrived. And then: it was over.</p>
    ${ch([
      'You were paralysed by a spell — unable to move. You witnessed everything. Could not act.',
      'You filed everything — Draco shaking, Dumbledore\'s certainty, Snape\'s expression. Used it later.',

    ],'chooseTower','What stays with Harry?')}`)

    {rel:{draco:8},stats:{wisdom:14,cunning:8},log:'Year 6, the Tower: filed everything. Used it all later.'},
    {stats:{courage:12,wisdom:10},log:'Year 6, the Tower: Dumbledore wasn\'t afraid. That helped you, later.'},

/* ══════════════════════════════════════════════════════
   YEAR SEVEN
══════════════════════════════════════════════════════ */
function startYear7(){
  G.phase='y7_start';G.age=17;G.year=7;G.ftUsed=[];
  const echoes=G.cascadeEchoes||[];
  const echoPanel=echoes.length?`
    <div style="background:rgba(201,151,42,.07);border:1px solid rgba(201,151,42,.25);border-radius:6px;padding:.8rem 1rem;margin-bottom:1rem">
      <div style="font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold2);margin-bottom:.55rem">🔮 Threads from Your Past — Now Arriving</div>
      ${echoes.map(e=>`<div style="font-size:13px;color:#c0a060;padding:4px 0;border-bottom:1px solid rgba(201,151,42,.1);line-height:1.6">${e}</div>`).join('')}
    </div>`:'';
  pg('Year Seven — The Horcrux Hunt','On the Run',
    `${hud()}
    ${echoPanel}
    <p class="prose">Not Hogwarts. A tent. The countryside of Britain in rotation. The locket Horcrux around someone\'s neck at all times — a cold, poisoning weight. Ron had it on too much. Ron left. The tent felt immediately smaller.</p>
    <p class="prose">Hermione kept working. You kept working. Neither of you spoke about the empty corner.</p>
    ${dlg('Hermione Granger','"He\'ll come back. You know he will. Won\'t he?"')}
    ${ch([
      '"Yes. He will." You believed this. You held onto it the way you held onto the Patronus memory.',
      '"I don\'t know." Honest. She went back to her maps. Honesty was sometimes the most you could offer.',
      '"He always comes back." History supported this. Ron comes back.',
      '"He\'s angry at himself more than at me. Give him time." You\'d thought about this carefully.',
    ],'chooseRonGone','Harry\'s response:')}`)
}
function chooseRonGone(i){
  const d=[
    {rel:{ron:5,hermione:8},stats:{courage:10,loyalty:14},log:'Year 7: Ron left. Told Hermione he\'d come back. Believed it.'},
    {rel:{hermione:10},stats:{wisdom:12,loyalty:8},log:'Year 7: Ron left. Said you didn\'t know. She went back to maps.'},
    {rel:{ron:8},stats:{loyalty:12,wisdom:8},log:'Year 7: Ron left. Cited the pattern. "He always comes back."'},
    {rel:{ron:10},stats:{wisdom:14,cunning:8},log:'Year 7: Ron left. Identified the real anger. Waited.'},
  ];
  mut(d[i].stats);mut(d[i].rel);addLog(7,d[i].log);G.ftUsed=[];saveGame();
  renderFreeTime('phaseDobbyShellCottage',2);
}

function phaseDobbyShellCottage(){
  pg('Year Seven — Shell Cottage','Dobby',
    `${hud()}
    ${relPanel(['ron','hermione','neville','luna','dobby','ginny'])}
    <p class="prose">Malfoy Manor. Captured. Dobby arrived with a crack. He saved you all — Hermione, Ron, Luna, Dean, Ollivander. Apparating you out one by one. And then: Bellatrix\'s knife, thrown as they disappeared.</p>
    <p class="prose">Dobby died in your arms outside Shell Cottage. In the garden. Small and warm and briefly, completely free.</p>
    ${dlg('Dobby','"Harry Potter. Such a long way to come."')}
    ${ch([
      'You dug the grave yourself — no magic. Hands in the earth. The work of it was the point.',
      'You chose the stone carefully. The words: <em>Here lies Dobby, a Free Elf.</em> Not servant. What he became.',
      'You dug and thought of everything since Year Two: the warning, the sock, every moment in between. A friendship.',
      'You wept while digging and were not ashamed. Ron and Hermione stood nearby and said nothing. That was right.',
    ],'chooseDobbyDeath','What is this moment for Harry?')}`)
}
function chooseDobbyDeath(i){
  const d=[
    {rel:{dobby:0},stats:{wisdom:14,loyalty:10},good:1,log:'Year 7: dug Dobby\'s grave by hand. Some things can only be honoured, not solved.'},
    {rel:{dobby:0},stats:{loyalty:12,wisdom:12},good:1,log:'Year 7: chose the words: "A Free Elf." He had been one, at the end.'},

}

function phaseRoomOfRequirement(){
  pg('Year Seven — Hogwarts','The Return',
    `${hud()}
    ${relPanel(['neville','ron','hermione','ginny','luna','draco'])}
    <p class="prose">Back to Hogwarts. Neville met you. His face told you what the year had cost — the careful eyes, the healing cuts, the particular stillness of someone who has held something together through significant personal cost.</p>
    ${dlg('Neville Longbottom','"Harry. We didn\'t know if you were coming. But we kept it going. The DA. We thought — it was what you\'d want."')}
    <p class="prose">And then: the Room of Requirement. The Diadem of Ravenclaw. Draco\'s cronies setting Fiendfyre. Everything burning.</p>
    ${ch([
      'You went back for Draco without thinking about whether he deserved it. He was a person who was about to die.',
      '"Ron." One word. He understood. You both went. Pulled Draco out.',
      'You turned the broom before the thought completed. The instinct to save ran deeper than the accounting.',
      'Hermione\'s expression said she knew you were going anyway. You went.',

function chooseDracoSave(i){

    {rel:{ron:10,neville:15,draco:18},stats:{courage:16,loyalty:14},good:1,log:'Year 7: one word to Ron. You both went. Pulled Draco out.'},
    {rel:{draco:16,neville:14},stats:{courage:20,loyalty:12},good:1,log:'Year 7: instinct ran deeper than the ledger. Turned and went.'},
    {rel:{hermione:10,draco:14,neville:12},stats:{courage:16,loyalty:12},good:1,log:'Year 7: Hermione knew. You went.'},
  ];
  mut(d[i].stats);mut(d[i].rel);G.good+=(d[i].good||0);G.horcruxes=6;
  setFlag('saved_draco_fiendfyre');
  addLog(7,d[i].log);
  // This echoes immediately into the Battle

  phaseForest();
}

function phaseForest(){
  pg('Year Seven — The Forest','The Last Horcrux',
    `${hud()}
    <p class="prose">The Resurrection Stone. Your parents. Sirius. Lupin. A circle of light in the dark forest, silver and certain.</p>
    ${dlg('Lily Potter','"You\'ve been so brave, sweetheart."')}
    ${dlg('James Potter','"You\'re nearly there."')}
    <p class="prose">You had calculated the choice and understood it fully. The Horcrux inside you — placed there when you were one year old — had to die. You walked toward Voldemort. You let him kill you.</p>
    ${ch([
      'You thought of Ginny. Coming back. The morning after. It carried you forward.',
      'You thought of Ron and Hermione. They\'ll be all right. That was more than enough.',
      'You dropped the Stone before the clearing. Your parents\' faces faded. You walked in alone.',
      'You thought of Dumbledore. "You have been loved." You walked forward understanding what that meant.',
    ],'chooseForest','What carries Harry into the forest?')}`)
}
function chooseForest(i){
  const d=[
    {rel:{ginny:10},stats:{courage:20,loyalty:16},good:2,log:'Year 7, the forest: thought of Ginny. Coming back. Walked forward.'},

    {stats:{courage:18,wisdom:14,loyalty:12},good:2,log:'Year 7, the forest: dropped the Stone. Walked in alone. How it had to be.'},
    {rel:{dumbledore:8},stats:{courage:18,wisdom:12,loyalty:14},good:2,log:'Year 7, the forest: "You have been loved." Walked forward understanding it.'},
  ];
  mut(d[i].stats);mut(d[i].rel||{});G.good+=(d[i].good||0);G.horcruxes=7;

}

function phaseBattleOfHogwarts(){
  pg('Year Seven — The Battle','The Great Hall',
    `${hud()}
    ${relPanel(['ron','hermione','neville','ginny','fred','draco','mcgonagall'])}
    <p class="prose">You came back. Voldemort announced your death. Neville pulled the sword from the Sorting Hat and killed Nagini — the last Horcrux. The Battle continued. Fred Weasley died. Lupin. Tonks. Fifty others.</p>
    <p class="prose">And then: you stepped out of Neville\'s cloak in the Great Hall. The room had exactly one second to be entirely still.</p>
    ${dlg('Lord Voldemort','"Harry Potter is dead! Your saviour is DEAD!"')}
    <div class="result-box" style="border-left-color:#8b1a1a">⚔️ The Final Duel. This is what it\'s all been for.</div>
    <button class="btn btn-red btn-wide" onclick="doFinalDuel()">⚡ Face Voldemort — The Last Stand!</button>`
  );
}

function doFinalDuel(){
  startDuel('Lord Voldemort',
    ()=>{
      G.good+=3;mut({courage:25,magic:15,gryf:200,loyalty:20});
      addLog(7,'The Battle: faced Voldemort. Expelliarmus. His Killing Curse rebounded. It was over. All was well.');
      unlockAchievement('chosen_one');unlockAchievement('protector');
      G.savedEveryone=true;SFX.success();
      for(let i=0;i<15;i++)setTimeout(()=>spawnParticle(Math.random()*window.innerWidth,Math.random()*window.innerHeight,'⭐'),i*150);
      saveGame();phaseVictory();
    },
    ()=>{
      G.good+=2;mut({courage:20,magic:10,gryf:100});
      addLog(7,'The Battle: the fight was desperate. But at the crucial moment, the Elder Wand refused to act against its true master. Voldemort fell.');
      unlockAchievement('chosen_one');
      SFX.success();saveGame();phaseVictory();
    }
  );
}

function phaseVictory(){
  render(`<div class="page">
    <div class="eyebrow">Year Seven — The End</div>
    <div class="title">The Battle is Over</div>
    <div class="reveal-box">
      <span class="reveal-big" style="background:linear-gradient(135deg,#c9972a,#f5d070,#c9972a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">ALL IS WELL</span>
    </div>
    <p class="prose">The silence that followed was the loudest thing you had ever heard. Then: noise. Ron and Hermione. Mrs Weasley. Ginny running toward you through the crowd — you catching her and holding on. Hagrid sobbing with the force of someone who has been holding it in since September. The castle, damaged but standing, morning light coming through holes in the walls.</p>
    ${dlg('Ron Weasley','"Oi. You\'re alive." He looked you up and down. "You absolute—" He hugged you instead of finishing the sentence.')}
    <div class="result-box" style="border-left-color:#ffd700">☀️ The war is over. Harry Potter survived. Everything Dumbledore believed about love was true.</div>
    <button class="btn btn-gold btn-wide" onclick="phaseEpilogue()">Continue to the Epilogue →</button>
  </div>`);
  mut({ginny:15,ron:15,hermione:15,gryf:500});saveGame();
}

function phaseEpilogue(){
  G.age=37;
  pg('Nineteen Years Later','King\'s Cross',
    `${hud()}
    <p class="prose">The same platform. A different kind of heart. Three children — James Sirius, Albus Severus, Lily Luna — at the edge of the barrier. Ginny beside you. Your hand in hers.</p>
    <p class="prose">Albus is about to board the train for his first year. He looks at you with your mother\'s eyes in your father\'s face, and he is afraid.</p>
    ${dlg('Albus Potter','"Dad — what if I\'m in Slytherin?"')}
    ${ch([
      '"Albus Severus. You were named for two headmasters of Hogwarts. One of them was a Slytherin and was probably the bravest man I ever knew."',
      '"Then Slytherin will have someone brave and kind in it, which it needs. The hat takes your choice into account."',
      '"Then you\'ll be the first Potter Slytherin in history. Your grandparents would probably find it hilarious."',
      '"It doesn\'t matter which house. What matters is who you choose to be inside it." Ginny squeezes your hand.',
    ],'chooseEpilogue','What does Harry say?')}`)
}
function chooseEpilogue(i){
  const d=[
    {stats:{wisdom:12,loyalty:10},log:'Nineteen years later: told Albus about Snape. He went quiet. He understood.'},
    {stats:{courage:8,wisdom:10},log:'Nineteen years later: "The hat takes your choice into account." Albus boarded looking less afraid.'},
    {stats:{courage:8,loyalty:8},log:'Nineteen years later: made Albus laugh. He boarded the train lighter.'},
    {stats:{wisdom:10,loyalty:12},log:'Nineteen years later: "Who you choose to be." Ginny squeezed your hand. Albus boarded the train.'},
  ];
  mut(d[i].stats);G.good++;addLog(37,d[i].log);saveGame();phaseEnding();
}

/* ══════════════════════════════════════════════════════
   FINAL SCORE & ENDING
══════════════════════════════════════════════════════ */
function phaseEnding(){
  G.phase='ending';
  const s=G.stats;
  const statTotal=Object.values(s).filter((_,i)=>i<7).reduce((a,b)=>a+b,0);
  const relBonus=Object.values(G.rel).filter(v=>v>50).length*5;
  const achieveBonus=G.achievements.length*4;
  const spellBonus=G.spells.length*2;
  const masteryBonus=Object.values(G.spellXP||{}).filter(v=>v>=80).length*6;
  const wandBonus=Math.round(G.wandPower*.3);
  const cascadeBonus=(G.cascadeEchoes||[]).length*4;
  const score=cl(Math.round(statTotal/7*0.5+G.good*3+relBonus+achieveBonus+spellBonus+masteryBonus+wandBonus+cascadeBonus+G.quidditchWins*3+G.duelWins*2+G.romanceLevel*0.3),0,100);

  const titles=[
    [95,'The greatest wizard of his age — a name spoken with reverence for generations.'],
    [85,'The Boy Who Lived, and lived extraordinarily. A legend, fully deserved.'],
    [75,'A brave and honourable wizard who left the world measurably better.'],
    [63,'A complex soul who faced impossible odds and came through with his humanity intact.'],
    [50,'A survivor. Not nothing. In fact, everything.'],
    [0,'Someone who got through it. That, in the end, is quite enough.'],
  ];
  const title=titles.find(([min])=>score>=min)[1];
  const echoes=G.cascadeEchoes||[];

  // Spell mastery summary
  const masteryDisplay=G.spells.map(sp=>{
    if(!sp)return'';
    const xp=G.spellXP[sp]||0;
    let lv='N',col='#6a3030';
    if(xp>=80){lv='M';col='#c9972a';}
    else if(xp>=60){lv='E';col='#8a8020';}
    else if(xp>=40){lv='Ad';col='#2a6a2a';}
    else if(xp>=20){lv='Ap';col='#2a4a8a';}
    return`<span style="font-size:10.5px;font-family:'Cinzel',serif;padding:2px 8px;background:rgba(0,0,0,.3);color:${col};border:1px solid ${col};border-radius:10px;margin:2px">${sp.split(' ')[0]} <span style="opacity:.8">${lv}</span> <span style="opacity:.5">${xp}</span></span>`;
  }).join('');

  render(`<div class="page">
    <div class="eyebrow">The End of the Story</div>
    <div class="title">The Life of Harry James Potter</div>

    <div class="score-screen">
      <div class="score-ring" style="--pct:${score}%">
        <span class="score-num">${score}</span>
      </div>
      <p class="score-title">${title}</p>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:.35rem;margin-top:.5rem">
        <span class="badge badge-gryf" style="font-size:12px">🦁 Gryffindor · Class of 1998</span>
        ${G.romance==='ginny'?'<span class="badge" style="background:#3a0a1a;color:#ffb0c0;border:1px solid #8a2a4a;font-size:12px">💗 Married Ginny Weasley</span>':''}
        <span class="badge badge-purple" style="font-size:12px">🪄 Wand Power: ${G.wandPower}</span>
        <span class="badge badge-gold" style="font-size:12px">⚡ ${G.duelWins} Duels Won</span>
      </div>
    </div>

    ${echoes.length?`
    <div style="margin:1rem 0;background:rgba(201,151,42,.07);border:1px solid rgba(201,151,42,.3);border-radius:6px;padding:1rem">
      <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold2);margin-bottom:.65rem">🔮 Choices That Rippled Through Your Story</div>
      ${echoes.map(e=>`<div style="font-size:13px;color:#c0a060;padding:5px 0;border-bottom:1px solid rgba(201,151,42,.08);line-height:1.7">${e}</div>`).join('')}
    </div>`:''}

    ${charPortrait('Harry Potter','The scar had not pained him for nineteen years. All was well.',100)}

    <p class="prose" style="margin-top:1rem">The entry in <em>Hogwarts: A History,</em> revised edition, runs to twenty-seven pages. They got the scar right. They got the eyes — <em>green, his mother\'s green</em> — right. They got the wand right: <em>holly, phoenix feather, eleven inches, nice and supple.</em></p>
    <p class="prose">What they did not entirely capture was the way he listened to people. The way he was always slightly late to understand that people loved him, and then seemed genuinely surprised by it each time.</p>
    <p class="prose italic" style="text-align:center;color:var(--gold);font-size:18px">"The scar had not pained Harry for nineteen years. All was well."</p>

    <hr style="border:none;border-top:1px solid var(--border);margin:1.5rem 0">

    <div class="eyebrow" style="margin-bottom:.5rem">Final Statistics & Wand Mastery</div>
    ${hud()}

    <div class="eyebrow" style="margin-bottom:.4rem;margin-top:.8rem">Spell Mastery (${G.spells.length} spells · ${Object.values(G.spellXP||{}).filter(v=>v>=80).length} mastered)</div>
    <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:1rem">${masteryDisplay}</div>

    <div class="eyebrow" style="margin-bottom:.4rem">Achievements (${G.achievements.length}/${ALL_ACHIEVEMENTS.length})</div>
    <div class="ach-grid">
      ${ALL_ACHIEVEMENTS.map(a=>{
        const unlocked=G.achievements.includes(a.id);
        return`<div class="ach-card ${unlocked?'unlocked':'locked'}">
          <span class="ach-icon">${a.icon}</span>
          <span class="ach-card-name">${a.name}</span>
          <span class="ach-card-desc">${unlocked?a.desc:'???'}</span>
        </div>`;
      }).join('')}
    </div>

    ${logPanel(15)}

    <button class="btn btn-gold btn-wide" onclick="showMenu()">✦ Play Again ✦</button>
    <button class="btn btn-wide" style="margin-top:.4rem" onclick="deleteSave();showMenu()">Start Fresh</button>
  </div>`);
  saveGame();
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
initGame();
showMenu();
</script>
