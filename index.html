<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Potter: A Wizarding Life</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1410;--ink2:#3d3028;--ink3:#7a6a5e;
  --parch:#f7f2e8;--parch2:#efe8d5;--parch3:#e5d9c0;--parch4:#d8c9a8;
  --gold:#c9972a;--gold2:#e8b84b;--gold3:#f5d070;
  --gryf:#8b1a1a;--slyth:#1a4a2e;--raven:#1a2a4a;--huff:#5a4a00;
  --border:#c4a882;--border2:#a08060;
  --dark:#0d0806;--dark2:#1a0f08;
  --magic:#6a0dad;--magic2:#9b30ff;
  --danger:#c0392b;--success:#1a5c2e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080604;min-height:100vh;font-family:'EB Garamond',Georgia,serif;overflow-x:hidden;cursor:default}

/* STARFIELD */
#sf{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--lo,.1)}50%{opacity:var(--hi,.8)}}

/* PARTICLES */
.ptcl{position:fixed;pointer-events:none;animation:floatUp var(--dur,3s) ease-out forwards;font-size:var(--sz,14px);z-index:1}
@keyframes floatUp{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}

/* LAYOUT */
#app{position:relative;z-index:2;width:100%;max-width:820px;margin:0 auto;padding:1.5rem 1rem 5rem;min-height:100vh}

/* MENU */
.menu-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1rem}
.menu-logo{font-family:'Cinzel',serif;font-size:clamp(26px,6vw,50px);font-weight:700;background:linear-gradient(135deg,#c9972a,#f5d070,#c9972a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.04em;line-height:1.2;animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
.menu-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#6a5040;margin:.5rem 0 2.5rem}
.menu-crest{font-size:70px;margin-bottom:1rem;animation:floatY 3s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.mbtn{display:block;width:100%;max-width:300px;margin:.45rem auto;padding:.9rem 2rem;font-family:'Cinzel',serif;font-size:14px;font-weight:600;letter-spacing:.1em;border:1px solid var(--gold);border-radius:4px;cursor:pointer;transition:all .2s}
.mbtn-p{background:linear-gradient(135deg,#7a1010,#c9972a);color:#fff8e8}
.mbtn-s{background:transparent;color:var(--gold)}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(201,151,42,.3)}

/* PAGE */
.page{background:linear-gradient(155deg,var(--parch),var(--parch2));border:1px solid var(--border);border-radius:6px;padding:1.75rem 1.6rem;margin-bottom:.8rem;position:relative;overflow:hidden;box-shadow:0 4px 30px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.3);animation:pIn .3s ease}
@keyframes pIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page::before{content:'';position:absolute;inset:7px;border:.5px solid var(--border2);pointer-events:none;border-radius:4px}
.page::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* TYPE */
.ey{font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink3);margin-bottom:.3rem}
.ttl{font-family:'Cinzel',serif;font-size:clamp(15px,2.8vw,20px);font-weight:600;color:var(--ink);margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem;line-height:1.3}
.prose{font-size:15.5px;line-height:1.95;color:var(--ink);margin-bottom:.85rem}
.sb{text-align:center;color:var(--ink3);margin:1rem 0;letter-spacing:.25em;font-size:12px}
.dlg{background:var(--parch2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:.65rem .95rem;margin:.7rem 0;font-size:14.5px;line-height:1.8;color:var(--ink);font-style:italic}
.dlg-n{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);font-style:normal;display:block;margin-bottom:2px}

/* CHOICES */
.q-lbl{font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin:.7rem 0 .25rem}
.q-txt{font-size:14.5px;font-weight:500;color:var(--ink);margin-bottom:.5rem;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:6px;margin-bottom:.85rem}
.choice{background:var(--parch2);border:1px solid var(--border);border-radius:4px;padding:.6rem .9rem;font-family:'EB Garamond',serif;font-size:14.5px;color:var(--ink);cursor:pointer;text-align:left;line-height:1.55;transition:all .15s;width:100%;position:relative;overflow:hidden}
.choice::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(201,151,42,.12),transparent);transition:width .25s}
.choice:hover{border-color:var(--gold);transform:translateX(4px)}
.choice:hover::before{width:100%}
.ch-ltr{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--gold);display:block;margin-bottom:2px}
.choice small{display:block;font-size:12px;color:var(--ink3);margin-top:2px;font-style:italic}

/* HUD */
.hud{background:linear-gradient(135deg,#0d0806,#1a0e06);border:1px solid #2a1a08;border-radius:6px;padding:.9rem 1.1rem;margin-bottom:.8rem;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem;flex-wrap:wrap;gap:.4rem}
.hud-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold2)}
.hud-meta{font-size:11.5px;color:#7a6050;display:flex;gap:.6rem;flex-wrap:wrap}
.hud-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1.2rem}
.sr{display:flex;align-items:center;gap:6px}
.sn{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.04em;color:#8a6840;width:64px;flex-shrink:0}
.st{flex:1;height:4px;background:#1a0e06;border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;transition:width .5s ease}
.sv{font-family:'Cinzel',serif;font-size:9px;color:#7a6050;width:20px;text-align:right;flex-shrink:0}
.wand-bar-wrap{margin-top:.5rem;display:flex;align-items:center;gap:8px}
.wand-lbl{font-family:'Cinzel',serif;font-size:8.5px;color:#8a6040;width:70px}
.wand-track{flex:1;height:6px;background:#1a0e06;border-radius:3px;overflow:hidden;position:relative}
.wand-fill{height:100%;background:linear-gradient(90deg,#5a0a8a,#c090ff,#f5d070);border-radius:3px;transition:width .7s ease;position:relative}
.wand-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:rgba(255,255,255,.6);border-radius:2px;animation:wglow 1.5s ease-in-out infinite}
@keyframes wglow{0%,100%{opacity:.4}50%{opacity:1}}
.wand-val{font-family:'Cinzel',serif;font-size:9px;color:var(--gold2);width:28px;text-align:right}
.hud-badges{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.45rem}

/* BADGES */
.badge{display:inline-block;font-family:'Cinzel',serif;font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.bg-g{background:var(--gryf);color:#ffd700;border:1px solid #c04040}
.bg-gold{background:linear-gradient(90deg,#7a5a00,#c9972a);color:#fff8e8}
.bg-p{background:#2a0a4a;color:#c090ff;border:1px solid #6a2aaa}
.bg-r{background:#1a0a2a;color:#ff90c0;border:1px solid #8a2a5a}
.bg-b{background:#0a1a3a;color:#90c0ff;border:1px solid #2a5a8a}

/* SPELL MASTERY PANEL */
.spell-panel{background:rgba(0,0,0,.3);border:1px solid #2a1810;border-radius:6px;padding:.75rem;margin-bottom:.8rem}
.sp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:5px;margin-top:.4rem}
.sp-card{background:linear-gradient(135deg,#100806,#1e1008);border:1px solid #2a1810;border-radius:4px;padding:.45rem .6rem;transition:all .15s}
.sp-card:hover{border-color:var(--gold)}
.sp-top{display:flex;align-items:center;gap:6px;margin-bottom:.25rem}
.sp-icon{font-size:14px}
.sp-name{font-family:'Cinzel',serif;font-size:9px;color:var(--gold2);flex:1}
.sp-lvl{font-family:'Cinzel',serif;font-size:8px;padding:1px 5px;border-radius:10px}
.lvl-N{background:#2a1010;color:#c06060}
.lvl-A{background:#1a1a2a;color:#6080c0}
.lvl-Ad{background:#1a2a1a;color:#60a060}
.lvl-E{background:#2a2000;color:#c0a000}
.lvl-M{background:linear-gradient(90deg,#3a2000,#5a3000);color:#f5d070}
.sp-xp-track{height:3px;background:#0d0806;border-radius:2px;overflow:hidden}
.sp-xp-fill{height:100%;border-radius:2px;transition:width .4s ease}
.sp-type-off{border-left:2px solid #8b1a1a}
.sp-type-def{border-left:2px solid #1a2a4a}
.sp-type-util{border-left:2px solid #1a4a2e}
.sp-type-dark{border-left:2px solid #4a0a6a}
.sp-type-sp{border-left:2px solid #c9972a}

/* PROGRESS */
.prog{display:flex;gap:3px;margin-bottom:1rem}
.ps{height:4px;flex:1;background:var(--parch3);border-radius:2px;transition:background .3s}
.pd{background:var(--gold)}
.pc{background:var(--gold3);animation:pb 1.5s ease-in-out infinite}
@keyframes pb{0%,100%{opacity:1}50%{opacity:.5}}

/* RESULT BOX */
.rbox{background:var(--parch2);border:1px solid var(--border);border-left:3px solid var(--gold2);border-radius:0 4px 4px 0;padding:.65rem .95rem;margin:.65rem 0;font-size:13.5px;line-height:1.6;color:var(--ink2)}
.rbox.danger{border-left-color:var(--danger);background:#fff5f5}
.rbox.success{border-left-color:#2a8a2a;background:#f5fff5}

/* BUTTONS */
.btn{background:var(--ink);color:var(--parch);border:none;border-radius:4px;padding:.6rem 1.4rem;font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--ink2);transform:translateY(-1px)}
.btn-g{background:linear-gradient(135deg,#7a5000,#c9972a);color:#fff8e8;border:1px solid #e8b84b}
.btn-g:hover{background:linear-gradient(135deg,#9a6a00,#e8b84b)}
.btn-w{width:100%;padding:.75rem;margin-top:.6rem}
.btn-r{background:var(--gryf);color:#ffd700;border:1px solid #c04040}
.btn-dark{background:#2a0a4a;color:#c090ff;border:1px solid #6a2aaa}

/* ══════════════════════
   DUEL ENGINE STYLES
══════════════════════ */
.duel-screen{background:radial-gradient(ellipse at 50% 30%,#1a0808 0%,#060303 100%);border:2px solid #4a1010;border-radius:8px;padding:1.25rem;margin:.5rem 0;box-shadow:0 0 50px rgba(139,26,26,.3),inset 0 0 80px rgba(0,0,0,.6)}
.duel-header{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:#e04040;text-align:center;margin-bottom:.8rem;text-shadow:0 0 20px rgba(220,40,40,.5);letter-spacing:.1em}
.duel-arena{display:flex;justify-content:space-around;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.duel-fighter{text-align:center;flex:1;min-width:120px}
.df-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold2);margin-bottom:.3rem;letter-spacing:.05em}
.df-hp-wrap{margin-bottom:.25rem}
.df-hp-bar{height:10px;border-radius:5px;overflow:hidden;background:#1a0808;margin:0 auto;max-width:120px}
.df-hp-fill{height:100%;border-radius:5px;transition:width .5s ease;position:relative}
.df-hp-fill::after{content:'';position:absolute;top:0;left:5px;right:5px;height:3px;background:rgba(255,255,255,.3);border-radius:2px}
.harry-hp{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.enemy-hp{background:linear-gradient(90deg,#6a1a1a,#8b1a1a)}
.df-hp-val{font-family:'Cinzel',serif;font-size:10px;color:#8a6060;margin-top:2px}
.duel-vs{font-family:'Cinzel',serif;font-size:22px;color:#c9972a;text-shadow:0 0 15px var(--gold);animation:vsGlow 1s ease-in-out infinite}
@keyframes vsGlow{0%,100%{text-shadow:0 0 15px var(--gold)}50%{text-shadow:0 0 30px var(--gold3),0 0 60px var(--gold)}}

.enemy-action{background:rgba(100,0,0,.3);border:1px solid #4a1010;border-radius:6px;padding:.65rem;text-align:center;margin-bottom:.9rem}
.ea-label{font-size:11px;color:#c08080;font-style:italic;margin-bottom:.2rem}
.ea-spell{font-family:'Cinzel',serif;font-size:18px;color:#ff8080;font-weight:700;animation:spellReveal .25s ease}
@keyframes spellReveal{from{transform:scale(1.4);opacity:0}to{transform:scale(1);opacity:1}}
.ea-hint{font-size:11px;color:#8a5050;margin-top:.2rem;font-style:italic}

.duel-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.8rem}
.da-btn{background:linear-gradient(135deg,#1a0a08,#2a1208);border:1px solid #3a1a10;border-radius:5px;padding:.6rem .5rem;cursor:pointer;text-align:center;transition:all .18s;font-family:'EB Garamond',serif}
.da-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(201,151,42,.2)}
.da-btn:active{transform:scale(.97)}
.da-btn.attack{border-color:#6a2020}
.da-btn.attack:hover{border-color:#c04040;background:linear-gradient(135deg,#200a0a,#381010)}
.da-btn.shield{border-color:#1a2a4a}
.da-btn.shield:hover{border-color:#3a5a8a;background:linear-gradient(135deg,#0a1020,#101830)}
.da-btn.dodge{border-color:#1a3a1a}
.da-btn.dodge:hover{border-color:#2a6a2a;background:linear-gradient(135deg,#0a1a0a,#101a10)}
.da-btn.heal{border-color:#3a2a00}
.da-btn.heal:hover{border-color:#7a5000;background:linear-gradient(135deg,#1a1000,#2a1800)}
.da-icon{font-size:20px;display:block;margin-bottom:3px}
.da-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold2);display:block;margin-bottom:1px}
.da-desc{font-size:11px;color:#7a5a40}

/* Spell selection in duel */
.spell-select{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px;margin-top:.6rem}
.ss-btn{background:linear-gradient(135deg,#120808,#1e0e0e);border:1px solid #3a1010;border-radius:4px;padding:.5rem .6rem;cursor:pointer;text-align:left;transition:all .15s}
.ss-btn:hover{border-color:var(--gold);transform:translateY(-1px)}
.ss-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.ss-icon{font-size:16px}
.ss-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold2);flex:1}
.ss-power{font-size:10px;color:#a06040;padding:1px 5px;background:#1a0808;border-radius:10px}
.ss-mastery{font-size:10px;color:#6a5040;font-style:italic;margin-top:1px}
.ss-dmg{font-family:'Cinzel',serif;font-size:9px;color:#c09060}

/* Duel log */
.duel-log{background:rgba(0,0,0,.4);border:1px solid #1a1010;border-radius:4px;padding:.5rem .7rem;max-height:120px;overflow-y:auto;margin-bottom:.6rem}
.dl-entry{font-size:12px;line-height:1.6;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.dl-harry{color:#e8b84b}
.dl-enemy{color:#e07060}
.dl-system{color:#7a6050;font-style:italic}
.dl-crit{color:#f5d070;font-weight:600}

/* Round info */
.duel-round-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.duel-round{font-family:'Cinzel',serif;font-size:10px;color:#6a4a30;letter-spacing:.05em}
.duel-timer{height:4px;flex:1;margin:0 .8rem;background:#1a0808;border-radius:2px;overflow:hidden}
.duel-timer-fill{height:100%;background:linear-gradient(90deg,var(--gryf),#e8b84b);border-radius:2px;transition:width .1s linear}

/* Hit animation */
.hit-flash{animation:hitFlash .3s ease}
@keyframes hitFlash{0%,100%{background:inherit}50%{background:rgba(200,50,50,.3)}}
.spell-cast-anim{position:fixed;pointer-events:none;z-index:9998;font-size:30px;animation:spellCast .5s ease forwards}
@keyframes spellCast{0%{transform:scale(0) rotate(-20deg);opacity:0}50%{transform:scale(1.4) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0) translateY(-30px);opacity:0}}

/* Notification */
.notif{position:fixed;top:1rem;right:1rem;z-index:9999;background:linear-gradient(135deg,#150a06,#231208);color:var(--gold2);border:1px solid var(--gold);border-radius:6px;padding:.55rem 1rem;font-family:'EB Garamond',serif;font-size:13.5px;max-width:260px;line-height:1.5;animation:nIn .25s ease,nOut .25s ease 2.7s forwards;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:none}
@keyframes nIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
@keyframes nOut{to{transform:translateX(110%);opacity:0}}

/* Achievement popup */
.ach-pop{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);z-index:9999;background:linear-gradient(135deg,#1e1000,#3a2000);border:2px solid var(--gold);border-radius:8px;padding:.75rem 1.4rem;text-align:center;min-width:240px;animation:achIn .4s cubic-bezier(.34,1.56,.64,1),achOut .3s ease 3.5s forwards;box-shadow:0 0 40px rgba(201,151,42,.35)}
@keyframes achIn{from{transform:translateX(-50%) translateY(70px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes achOut{to{transform:translateX(-50%) translateY(70px);opacity:0}}

/* Reveal */
.reveal-box{text-align:center;padding:1.2rem .8rem;margin:.8rem 0}
.reveal-big{font-family:'Cinzel',serif;font-size:clamp(26px,5.5vw,42px);font-weight:700;display:block;margin:.4rem 0;animation:revealAnim .5s ease}
@keyframes revealAnim{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

/* HP bars for house */
.hp-bars{display:flex;gap:3px;height:18px;margin-top:.4rem}
.hpb{flex:1;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:flex .8s ease;position:relative}
.hpb span{font-family:'Cinzel',serif;font-size:9px;font-weight:600;color:rgba(255,255,255,.85);z-index:1}
.hpb-gr{background:linear-gradient(90deg,#6b1010,#8b1a1a)}
.hpb-sl{background:linear-gradient(90deg,#0d3020,#1a4a2e)}
.hpb-ra{background:linear-gradient(90deg,#0d1830,#1a2a4a)}
.hpb-hu{background:linear-gradient(90deg,#3a2800,#5a4000)}

/* Rel panel */
.rel-panel{background:var(--parch2);border:1px solid var(--border);border-radius:4px;padding:.75rem;margin-bottom:.8rem}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:5px;margin-top:.4rem}
.rc{background:var(--parch);border:1px solid var(--border);border-radius:4px;padding:.45rem .6rem;transition:all .12s}
.rc:hover{border-color:var(--gold);transform:translateY(-1px)}
.rc-name{font-family:'Cinzel',serif;font-size:9.5px;color:var(--ink2);margin-bottom:3px}
.rc-bar{height:3.5px;background:var(--parch3);border-radius:2px;overflow:hidden;margin-bottom:2px}
.rc-fill{height:100%;border-radius:2px;transition:width .5s ease}
.rc-st{font-size:10.5px;color:var(--ink3);font-style:italic}

/* Log */
.log-panel{border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:.8rem}
.lh{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);padding:.35rem .8rem;background:var(--parch2);border-bottom:1px solid var(--border)}
.le{padding:5px .8rem;border-bottom:1px solid var(--border);display:flex;gap:8px;font-size:12.5px;color:var(--ink2);line-height:1.45}
.le:last-child{border-bottom:none}
.la{font-family:'Cinzel',serif;font-size:9px;color:var(--ink3);flex-shrink:0;min-width:40px}
.le.cascade{background:rgba(201,151,42,.06)}
.le .cascade-tag{font-family:'Cinzel',serif;font-size:8px;color:var(--gold);padding:1px 4px;border:1px solid var(--gold);border-radius:3px;margin-right:4px;flex-shrink:0}

/* Flag cascade indicator */
.cascade-notice{background:rgba(201,151,42,.08);border:1px solid rgba(201,151,42,.3);border-radius:4px;padding:.5rem .75rem;margin:.5rem 0;font-size:12.5px;color:var(--gold2);font-style:italic;display:flex;align-items:center;gap:.5rem}
.cascade-notice::before{content:'🔮';font-size:14px;font-style:normal}

/* Minigame */
.mg-wrap{background:linear-gradient(160deg,#0a0604,#160c06);border:2px solid var(--gold);border-radius:8px;padding:1.2rem;margin:.5rem 0;box-shadow:0 0 30px rgba(201,151,42,.15),inset 0 0 60px rgba(0,0,0,.5)}
.mg-title{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:var(--gold2);text-align:center;margin-bottom:.2rem}
.mg-sub{font-size:13.5px;color:#7a6050;text-align:center;margin-bottom:1rem;font-style:italic}
.mg-timer{height:5px;background:#1a0e06;border-radius:3px;overflow:hidden;margin-bottom:.8rem}
.mg-tf{height:100%;background:linear-gradient(90deg,var(--gryf),var(--gold2));border-radius:3px;transition:width .1s linear}

/* Quidditch */
#qc{display:block;margin:0 auto;border-radius:6px;border:1px solid #2a1a08;cursor:crosshair;box-shadow:inset 0 0 40px rgba(0,0,0,.5)}

/* Potions */
.pot-recipe{background:rgba(0,0,0,.3);border-radius:4px;padding:.4rem .7rem;margin-bottom:.75rem;font-size:12.5px;color:var(--gold2);text-align:center}
.pot-cauldron{width:100px;height:85px;margin:0 auto .75rem;background:radial-gradient(ellipse,#1a1a2a,#0d0d15);border:2.5px solid #4a4060;border-radius:8px 8px 40% 40%;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
.pot-bubbles{position:absolute;bottom:0;left:0;right:0;height:18px;background:rgba(106,13,173,.3);animation:bbl 1s ease-in-out infinite}
@keyframes bbl{0%,100%{height:12px}50%{height:22px}}
.ing-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.75rem}
.ing-btn{background:var(--parch2);border:2px solid var(--border);border-radius:5px;padding:.5rem .3rem;cursor:pointer;text-align:center;transition:all .18s;font-family:'EB Garamond',serif}
.ing-btn:hover{border-color:var(--gold);transform:translateY(-2px)}
.ing-btn.sel{border-color:#6a0dad;background:#1a0830;color:#c090ff}
.ing-btn.ok{border-color:#1a6a1a;background:#0d1e0d;animation:okPulse .35s ease}
.ing-btn.bad{border-color:#6a1a1a;background:#1e0d0d;animation:bdShake .25s ease}
@keyframes okPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes bdShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.ing-icon{font-size:22px;display:block;margin-bottom:2px}
.ing-name{font-size:10px;color:var(--ink3)}

/* OWL exam */
.owl-q{font-size:14.5px;color:var(--ink);margin-bottom:.9rem;line-height:1.6;font-weight:500}
.owl-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:.8rem}
.owl-btn{background:var(--parch2);border:1px solid var(--border);border-radius:4px;padding:.55rem .85rem;cursor:pointer;text-align:left;font-family:'EB Garamond',serif;font-size:14px;color:var(--ink);transition:all .12s}
.owl-btn:hover{border-color:var(--gold);background:var(--parch3)}
.owl-btn.ok{background:#d4f0d4;border-color:#1a6a1a;color:#0a2a0a}
.owl-btn.bad{background:#f0d4d4;border-color:#6a1a1a;color:#2a0a0a}
.owl-prog{font-family:'Cinzel',serif;font-size:10.5px;color:var(--ink3);text-align:center;margin-bottom:.6rem}
.grade-big{font-family:'Cinzel',serif;font-size:46px;font-weight:700;text-align:center;display:block;margin:.4rem 0;animation:revealAnim .45s ease}

/* Free time */
.ft-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:.8rem}
.ft-btn{background:var(--parch2);border:1px solid var(--border);border-radius:4px;padding:.65rem .6rem;cursor:pointer;text-align:left;transition:all .15s;font-family:'EB Garamond',serif}

.ft-name{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);display:block;margin-bottom:1px}
.ft-desc{font-size:11.5px;color:var(--ink3);line-height:1.35}

/* Score */
.score-ring{width:130px;height:130px;border-radius:50%;margin:.8rem auto;background:conic-gradient(var(--gold) 0%,var(--gold) var(--pct),#1a0e06 var(--pct));display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(201,151,42,.3);position:relative}
.score-ring::before{content:'';position:absolute;inset:10px;background:var(--parch);border-radius:50%}
.score-num{font-family:'Cinzel',serif;font-size:40px;font-weight:700;color:var(--ink);position:relative;z-index:1}

/* Ach grid */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:7px;margin:.6rem 0}
.ac{background:var(--parch2);border:1px solid var(--border);border-radius:5px;padding:.55rem;text-align:center;transition:all .15s}
.ac.on{border-color:var(--gold);background:linear-gradient(135deg,#1e1200,#2e1c00)}

.ac-icon{font-size:22px;display:block;margin-bottom:.2rem}
.ac-name{font-family:'Cinzel',serif;font-size:9.5px;color:var(--gold2);display:block;margin-bottom:1px}
.ac-desc{font-size:10.5px;color:#7a6050;font-style:italic}

/* Inventory */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin:.4rem 0}

}

let aCtx=null;
function getAC(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx;}
function tone(f,type,dur,vol=0.12,delay=0){
  try{const ac=getAC();const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=type;
  o.frequency.setValueAtTime(f,ac.currentTime+delay);
  g.gain.setValueAtTime(vol,ac.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur);}catch(e){}
}

/* ─────────────────────────────────────────────
   SPELL MASTERY SYSTEM
───────────────────────────────────────────── */
function masteryLevel(xp){
  if(xp>=80)return{lbl:'Master',cls:'lvl-M',mult:1.6};
  if(xp>=60)return{lbl:'Expert',cls:'lvl-E',mult:1.3};
  if(xp>=40)return{lbl:'Adept',cls:'lvl-Ad',mult:1.0};
  if(xp>=20)return{lbl:'Apprentice',cls:'lvl-A',mult:0.8};
  return{lbl:'Novice',cls:'lvl-N',mult:0.6};
}
function gainXP(spellId,amt){
  if(!G.mastery[spellId])G.mastery[spellId]=0;
  const oldLvl=masteryLevel(G.mastery[spellId]);
  G.mastery[spellId]=cl(G.mastery[spellId]+amt,0,100);
  const newLvl=masteryLevel(G.mastery[spellId]);
  if(oldLvl.lbl!==newLvl.lbl){
    notify(`${SPELLS[spellId].name} → ${newLvl.lbl}!`,'⚡');SFX.levelup();
    for(let i=0;i<5;i++)setTimeout(()=>spawnPtcl(Math.random()*window.innerWidth,Math.random()*window.innerHeight*.6,'⭐'),i*120);
  }
}
function learnSpell(id){
  if(!G.spells.includes(id)){
    G.spells.push(id);
    if(!G.mastery[id])G.mastery[id]=0;
    notify(`Learned: ${SPELLS[id].name}!`,'✨');SFX.spell();
    save();
  }
}
function calcDmg(spellId,wandPow){
  const sp=SPELLS[spellId];if(!sp)return 20;
  const xp=G.mastery[spellId]||0;
  const ml=masteryLevel(xp).mult;
  const wm=0.5+(wandPow/100)*0.65;
  return Math.round(sp.power*ml*wm);
}
function growWand(amt){
  const old=G.wandPower;
  G.wandPower=cl(G.wandPower+amt,0,100);
  if(Math.floor(old/10)!==Math.floor(G.wandPower/10))notify(`Wand Power: ${G.wandPower}!`,'🪄');
}

function duelShowSpells(){$('spell-selection').style.display='block';$('spell-selection').scrollIntoView({behavior:'smooth'});}
function duelHideSpells(){if($('spell-selection'))$('spell-selection').style.display='none';}

function duelCastSpell(id){
  clearTimeout(DS._timer);
  if(!DS.active)return;
  const sp=SPELLS[id];const dmg=calcDmg(id,DS.wandPow);
  SFX.spell();
  // Gain XP for using spell
  gainXP(id,rnd([4,5,6]));
  growWand(1);
  // Apply to enemy
  const isWeak=DS.enemy.weakTo===id;
  const finalDmg=isWeak?Math.round(dmg*1.8):dmg;
  DS.enemyCurHP=Math.max(0,DS.enemyCurHP-finalDmg);
  DS.log.push({type:'harry',txt:`⚔️ ${sp.name} hits for ${finalDmg}${isWeak?' (SUPER EFFECTIVE!)':''}!`});
  // Enemy attacks back
  duelApplyHit(DS.curEnemySpell.dmg,false,false);
  // Check win
  if(DS.enemyCurHP<=0){DS.active=false;clearTimeout(DS._timer);setTimeout(()=>duelWin(),600);return;}
  // Next round
  DS.round++;
  if(DS.round>DS.maxRounds&&DS.active){DS.active=false;clearTimeout(DS._timer);setTimeout(()=>DS.harryHP>DS.enemyCurHP?duelWin():duelLose(),500);return;}
  setTimeout(()=>renderDuel(),700);
}

function duelAction(type){
  clearTimeout(DS._timer);if(!DS.active)return;
  DS.shielding=false;
  if(type==='shield'){
    SFX.shield();DS.shielding=true;
    gainXP('protego',3);
    DS.log.push({type:'harry',txt:'🛡️ Protego! Shield raised!'});
    duelApplyHit(DS.curEnemySpell.dmg,true,false);
  }else if(type==='dodge'){
    SFX.dodge();
    const dodged=Math.random()<0.55;
    if(dodged){
      DS.log.push({type:'harry',txt:'💨 Dodged! Harry evaded completely!'});
      for(let i=0;i<3;i++)spawnPtcl(window.innerWidth/2+Math.random()*80-40,window.innerHeight*.4,'💫');
    }else{
      DS.log.push({type:'system',txt:'💨 Failed dodge — full hit!'});
      duelApplyHit(DS.curEnemySpell.dmg,false,false);
    }
  }else if(type==='heal'){
    if(DS.healsLeft<=0){notify('No heals remaining!','💊');return;}
    DS.healsLeft--;SFX.heal();
    const amount=25;DS.harryHP=Math.min(DS.harryMaxHP,DS.harryHP+amount);
    DS.log.push({type:'harry',txt:`💊 Healed +${amount} HP! (${DS.healsLeft} remaining)`});
    duelApplyHit(DS.curEnemySpell.dmg,false,false);
  }
  DS.round++;
  if(DS.round>DS.maxRounds&&DS.active){DS.active=false;clearTimeout(DS._timer);setTimeout(()=>DS.harryHP>DS.enemyCurHP?duelWin():duelLose(),500);return;}
  setTimeout(()=>renderDuel(),700);
}

function duelApplyHit(baseDmg,shielded){
  const reduced=shielded?Math.round(baseDmg*0.3):baseDmg;
  const diffBonus={easy:0,medium:0.8,hard:1.0,vhard:1.2,boss:1.4}[DS.enemy.difficulty]||1;
  const finalDmg=Math.max(1,Math.round(reduced*diffBonus));
  DS.harryHP=Math.max(0,DS.harryHP-finalDmg);
  if(finalDmg>0){DS.log.push({type:'enemy',txt:`💥 ${DS.curEnemySpell.name} hits for ${finalDmg}${shielded?' (reduced)':''}!`});SFX.hit();}
  if(DS.harryHP<=0&&DS.active){DS.active=false;clearTimeout(DS._timer);setTimeout(()=>duelLose(),500);}
}

function duelWin(){
  G.duelWins++;growWand(rnd([4,6,8]));SFX.success();checkAchs();
  for(let i=0;i<8;i++)setTimeout(()=>spawnPtcl(Math.random()*window.innerWidth,Math.random()*window.innerHeight*.5,'⭐'),i*130);
  DS.onWin();
}
function duelLose(){SFX.fail();DS.onLose();}

let QS={};
function startQuidditch(onWin,onLose){
  const W=Math.min(350,window.innerWidth-60),H=210;
  QS={snitch:{x:W/2,y:H/2,vx:(Math.random()-.5)*2.5,vy:(Math.random()-.5)*2.5,a:0},timer:22,catches:0,needed:1,w:W,h:H,iv:null,tiv:null,onWin,onLose,active:true};
  pg(`Year ${G.yr} — Quidditch`,`🧹 Catch the Golden Snitch!`,
    `${hud()}
    <div class="mg-wrap">
      <div class="mg-title">🧹 Quidditch Match</div>
      <div class="mg-sub">Click the Golden Snitch before time runs out!</div>
      <div class="mg-timer"><div class="mg-tf" id="qt" style="width:100%"></div></div>
      <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);text-align:center;margin-bottom:.6rem" id="qs">Catches: 0/${QS.needed} — Time: 22s</div>
      <canvas id="qc" width="${W}" height="${H}" style="background:radial-gradient(ellipse,#1a3a1a,#0a1a0a)"></canvas>
    </div>`
  );
  const cv=$('qc');if(!cv)return;
  const ctx=cv.getContext('2d');
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
    for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(i*W/4,0);ctx.lineTo(i*W/4,H);ctx.stroke();}
    ctx.beginPath();ctx.arc(W/2,H/2,45,0,Math.PI*2);ctx.stroke();
    const s=QS.snitch;
    const g=ctx.createRadialGradient(s.x,s.y,2,s.x,s.y,18);
    g.addColorStop(0,'rgba(255,215,0,.7)');g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(s.x,s.y,18,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(s.x,s.y,9,0,Math.PI*2);ctx.fillStyle='#ffd700';ctx.fill();
    ctx.strokeStyle='#c9972a';ctx.lineWidth=1;ctx.stroke();
    s.a+=.06;ctx.save();ctx.translate(s.x,s.y);
    ctx.rotate(Math.sin(s.a)*.25);
    ctx.beginPath();ctx.ellipse(-14,0,12,4,-.3,0,Math.PI*2);ctx.fillStyle='rgba(255,215,100,.55)';ctx.fill();
    ctx.beginPath();ctx.ellipse(14,0,12,4,.3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  function move(){
    const s=QS.snitch;s.vx+=(Math.random()-.5)*.35;s.vy+=(Math.random()-.5)*.35;
    const spd=Math.sqrt(s.vx*s.vx+s.vy*s.vy),max=3+G.yr*.25;
    if(spd>max){s.vx=s.vx/spd*max;s.vy=s.vy/spd*max;}
    s.x+=s.vx;s.y+=s.vy;
    if(s.x<12){s.x=12;s.vx=Math.abs(s.vx);}if(s.x>W-12){s.x=W-12;s.vx=-Math.abs(s.vx);}
    if(s.y<12){s.y=12;s.vy=Math.abs(s.vy);}if(s.y>H-12){s.y=H-12;s.vy=-Math.abs(s.vy);}
    draw();
  }
  QS.iv=setInterval(move,40);
  QS.tiv=setInterval(()=>{
    QS.timer--;
    const qt=$('qt'),qs=$('qs');
    if(qt)qt.style.width=(QS.timer/22*100)+'%';
    if(qs)qs.textContent=`Catches: ${QS.catches}/${QS.needed} — Time: ${QS.timer}s`;
    if(QS.timer<=0&&QS.active){QS.active=false;clearInterval(QS.iv);clearInterval(QS.tiv);QS.catches>=QS.needed?QS.onWin():QS.onLose();}
  },1000);
  cv.addEventListener('click',e=>{
    if(!QS.active)return;
    const r=cv.getBoundingClientRect();const cx=e.clientX-r.left,cy=e.clientY-r.top;
    const s=QS.snitch;
    if(Math.sqrt((cx-s.x)**2+(cy-s.y)**2)<20){
      QS.catches++;SFX.snitch();
      for(let i=0;i<5;i++)spawnPtcl(e.clientX+Math.random()*40-20,e.clientY+Math.random()*40-20,'⭐');
      const qs=$('qs');if(qs)qs.textContent=`Catches: ${QS.catches}/${QS.needed} — Time: ${QS.timer}s`;
      s.vx=(Math.random()-.5)*7;s.vy=(Math.random()-.5)*7;
      if(QS.catches>=QS.needed&&QS.active){QS.active=false;clearInterval(QS.iv);clearInterval(QS.tiv);setTimeout(()=>QS.onWin(),400);}
    }
  });
  draw();
}

let OS={};
function startOWLs(subj,onDone){
  const qs=[...OWL_Q].sort(()=>Math.random()-.5).slice(0,7);
  OS={qs,cur:0,score:0,subj,onDone};renderOWL();
}
function renderOWL(){
  const{qs,cur,score,subj}=OS;
  if(cur>=qs.length){
    const pct=score/qs.length;
    let g,col;
    if(pct>=.9){g='O';col='#ffd700';}else if(pct>=.8){g='E';col='#60c060';}else if(pct>=.7){g='A';col='#6090c0';}else if(pct>=.6){g='P';col='#c08030';}else if(pct>=.5){g='D';col='#c04040';}else{g='T';col='#8a4040';}
    G.owlGrades[subj]=g;if(g==='O')unlockAch('outstanding');SFX.success();
    pg(`O.W.L. Results — ${subj}`,`📜 Your Grade`,
      `${hud()}<div class="reveal-box"><p class="prose" style="font-style:italic;color:var(--ink3)">Examiner Marchbanks reviews your paper...</p><span class="grade-big" style="color:${col}">${g}</span><p style="font-family:'Cinzel',serif;font-size:13px;color:var(--ink2);text-align:center">${{O:'Outstanding',E:'Exceeds Expectations',A:'Acceptable',P:'Poor',D:'Dreadful',T:'Troll'}[g]}</p><p class="prose" style="text-align:center">${score} of ${qs.length} correct</p></div><button class="btn btn-g btn-w" onclick="OS.onDone('${g}')">Continue →</button>`
    );return;
  }
  const q=qs[cur];const shuffled=q.a.map((a,i)=>({a,correct:i===q.c})).sort(()=>Math.random()-.5);
  pg(`Year 5 — O.W.L. Examinations`,`📜 ${subj}`,
    `${hud()}<div class="page" style="margin-bottom:0;box-shadow:none"><div class="owl-prog">Q ${cur+1}/7 · Score: ${score}</div><div class="mg-timer" style="margin-bottom:.9rem"><div class="mg-tf" style="width:${((qs.length-cur)/qs.length*100)}%"></div></div><p class="owl-q">${q.q}</p><div class="owl-opts">${shuffled.map((o,i)=>`<button class="owl-btn" id="ob-${i}" onclick="ansOWL(${i},${o.correct})">${o.a}</button>`).join('')}</div></div>`
  );
}
function ansOWL(idx,correct){
  document.querySelectorAll('.owl-btn').forEach(b=>b.disabled=true);
  const btn=$(`ob-${idx}`);
  if(correct){if(btn)btn.classList.add('ok');OS.score++;SFX.success();}
  else{if(btn)btn.classList.add('bad');SFX.fail();}
  OS.cur++;setTimeout(()=>renderOWL(),850);
}

}

/* ─── ENDING ─── */
function phaseEnding(){

  const statSum=Object.values(G.stats).reduce((a,b)=>a+b,0);
  const relBonus=Object.values(G.rel).filter(v=>v>50).length*4;
  const achBonus=G.achs.length*3;
  const spellBonus=G.spells.length*2;
  const cascadeBonus=G.cascadeCount*5;
  const masterBonus=Object.values(G.mastery).filter(v=>v>=80).length*4;
  const score=cl(Math.round(statSum/7*.5+G.good*2.5+relBonus+achBonus+spellBonus+cascadeBonus+masterBonus+G.wandPower*.3+G.duelWins*1.5),0,100);
  const titles=[[96,'The greatest wizard of his age. A legend. Entirely deserved.'],[88,'The Boy Who Lived, and lived extraordinarily well.'],[78,'A brave and good wizard who left the world measurably better.'],[66,'A complex, human person who faced impossible things and came through with himself intact.'],[54,'A survivor. Which is, in the end, not nothing. In fact, everything.'],[0,'Someone who got through it. That, quietly, is enough.']];
  const title=titles.find(([m])=>score>=m)[1];

  rndr(`<div class="page"><div class="ey">The End of the Story</div><div class="ttl">Harry James Potter — A Life</div>
    <div class="reveal-box"><div class="score-ring" style="--pct:${score}%"><span class="score-num">${score}</span></div><p style="font-family:'Cinzel',serif;font-size:16px;font-style:italic;color:var(--ink2);margin:.5rem 0 1rem;line-height:1.6">${title}</p></div>
    <p class="prose">The entry in <em>Hogwarts: A History</em> (revised edition, 1999) runs to thirty-one pages. They got the scar right. They got the eyes — green, his mother's green — right. They got the wand right: <em>holly, phoenix feather, eleven inches, nice and supple.</em></p>
    <p class="prose">What they didn't quite capture was the specificity of his loyalty — the particular way he made each person feel that their version of brave was the right version. The way he remembered things: not all of his own history, but <em>people's</em> details — what they feared, what made them laugh, who they were trying to become. He held those like the Patronus memory: precisely, and with warmth.</p>
    <p class="prose italic" style="text-align:center;color:var(--gold);font-size:17px;margin:1rem 0">"The scar had not pained Harry for nineteen years. All was well."</p>
    <hr style="border:none;border-top:1px solid var(--border);margin:1.25rem 0">

    ${hud()}

    ${spellPanel()}
    <div class="ey" style="margin-bottom:.3rem">Cascade Choices that Rippled Through the Story</div>
    <div style="background:rgba(201,151,42,.06);border:1px solid rgba(201,151,42,.2);border-radius:4px;padding:.6rem .85rem;margin-bottom:.8rem">
      ${[
        flag('showed_mercy_pettigrew')?'🕊️ Mercy to Pettigrew — rippled into Year 7 (silver hand hesitated)':'',
        flag('cared_neville_y1')?'🌿 Saw Neville clearly — rippled into Year 7 (he led the defence)':'',
        flag('da_founded')?'✊ Founded the DA — rippled into the Battle of Hogwarts':'',
        flag('charmed_slughorn')?'✨ Charmed Slughorn — obtained Felix Felicis':'',
        flag('honoured_cedric')?'🕯️ Honoured Cedric\'s promise — rippled in Year 7':'',
        flag('read_snape_tower')?'🔍 Read Snape in Year 6 — understood the memories faster':'',
        flag('saved_draco_y6')||flag('silent_save_draco')?'🔥 Saved Draco from Fiendfyre — he stepped aside in the Battle':'',
        flag('ft_sirius')||flag('asked_sirius_honestly')?'✉️ Built a real bond with Sirius — his echo was stronger':'',
      ].filter(Boolean).map(s=>`<div style="font-size:12.5px;color:var(--gold2);padding:3px 0;border-bottom:1px solid rgba(201,151,42,.1)">${s}</div>`).join('')||'<div style="font-size:12.5px;color:#7a6050;font-style:italic">No major cascade choices made — replaying with different decisions will unlock them.</div>'}
    </div>
    <div class="ey" style="margin-bottom:.3rem">Achievements (${G.achs.length}/${ACHS.length})</div>
    <div class="ach-grid">${ACHS.map(a=>{const on=G.achs.includes(a.id);return`<div class="ac ${on?'on':'off'}"><span class="ac-icon">${a.icon}</span><span class="ac-name">${a.name}</span><span class="ac-desc">${on?a.desc:'???'}</span></div>`;}).join('')}</div>
    ${logPanel(20)}

    <button class="btn btn-w" style="margin-top:.4rem" onclick="delSave();newGame()">Start Fresh</button>
  </div>`);
  save();
}
