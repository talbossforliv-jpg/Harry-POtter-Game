<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Potter: A Wizarding Life</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap');

:root {
  --ink:#1a1410;--ink2:#3d3028;--ink3:#6b5a4e;
  --parchment:#f7f2e8;--parchment2:#efe8d5;--parchment3:#e5d9c0;--parchment4:#ddd0b0;
  --gold:#b8860b;--gold2:#d4a017;--gold3:#f0c040;
  --red:#8b1a1a;--green:#1a4a2e;--blue:#1a2a4a;
  --border:#c4a882;--border2:#a08060;
  --gryf:#8b1a1a;--slyth:#1a4a2e;--raven:#1a2a4a;--huff:#5a4a00;
  --danger:#c0392b;--success:#1a5c2e;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background:radial-gradient(ellipse at top,#1a0f08 0%,#0d0806 100%);
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:1.5rem 1rem 3rem;
  font-family:'EB Garamond',Georgia,serif;
  background-attachment:fixed;
}

#app{width:100%;max-width:760px}

/* ── PAGE ── */
.page{
  background:var(--parchment);
  border:1px solid var(--border);border-radius:4px;
  padding:2rem 1.75rem;margin-bottom:1rem;
  position:relative;overflow:hidden;
  animation:fadeIn 0.3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.page::before{
  content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;
  border:0.5px solid var(--border2);pointer-events:none;border-radius:2px;
}

/* ── TYPOGRAPHY ── */
.eyebrow{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:.4rem}
.title{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:var(--ink);margin-bottom:1.25rem;line-height:1.3;border-bottom:1px solid var(--border);padding-bottom:.65rem}
.prose{font-size:16px;line-height:1.95;color:var(--ink);margin-bottom:1rem}
.prose em{font-style:italic}.prose strong{font-weight:600}
.indent{text-indent:2em}
.scene-break{text-align:center;color:var(--ink3);margin:1.2rem 0;font-size:13px;letter-spacing:.3em}

/* ── DIALOGUE ── */
.dialogue{
  background:var(--parchment2);border:1px solid var(--border);
  border-left:3px solid var(--gold);border-radius:0 3px 3px 0;
  padding:.7rem 1rem;margin:.85rem 0;font-size:15px;line-height:1.75;
  color:var(--ink);font-style:italic;
}
.speaker{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-style:normal;display:block;margin-bottom:3px}

/* ── CHOICES ── */
.q-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin:.9rem 0 .3rem}
.question{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:.6rem;line-height:1.5}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:1rem}
.choice{
  background:var(--parchment2);border:1px solid var(--border);border-radius:3px;
  padding:.65rem .9rem;font-family:'EB Garamond',serif;font-size:15px;
  color:var(--ink);cursor:pointer;text-align:left;line-height:1.6;
  transition:all .15s;width:100%;
}
.choice:hover{background:var(--parchment3);border-color:var(--gold);transform:translateX(2px)}
.choice:active{transform:scale(.99)}
.choice-letter{font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:var(--gold);display:block;margin-bottom:2px;letter-spacing:.05em}

/* ── BUTTONS ── */
.btn{background:var(--ink);color:var(--parchment);border:none;border-radius:3px;padding:.6rem 1.4rem;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--ink2)}
.btn-gold{background:var(--gold);color:#fff1cc}
.btn-gold:hover{background:var(--gold2)}
.btn-wide{width:100%;margin-top:.75rem;padding:.75rem}

/* ── HUD ── */
.hud{
  background:linear-gradient(135deg,#1a0f08,#2a1810);
  border:1px solid var(--border2);border-radius:4px;
  padding:1rem;margin-bottom:1rem;
  display:grid;grid-template-columns:1fr 1fr;gap:.75rem;
}
.hud-section{display:flex;flex-direction:column;gap:4px}
.hud-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#8a7060;margin-bottom:3px}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.stat-name{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;color:#c0a080;width:72px;flex-shrink:0}
.stat-track{flex:1;height:4px;background:#3a2820;border-radius:2px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .5s ease}
.stat-val{font-family:'Cinzel',serif;font-size:10px;color:#a08060;width:24px;text-align:right;flex-shrink:0}

/* ── RELATIONSHIP PANEL ── */
.rel-panel{
  background:var(--parchment2);border:1px solid var(--border);
  border-radius:3px;padding:.85rem;margin-bottom:1rem;
}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.rel-card{
  background:var(--parchment);border:1px solid var(--border);
  border-radius:3px;padding:.5rem .65rem;
}
.rel-name{font-family:'Cinzel',serif;font-size:10px;color:var(--ink2);margin-bottom:3px}
.rel-hearts{font-size:12px;letter-spacing:1px}
.rel-status{font-size:11px;color:var(--ink3);font-style:italic}

/* ── ACTIVITY PANEL ── */
.activity-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.activity-btn{
  background:var(--parchment2);border:1px solid var(--border);
  border-radius:3px;padding:.75rem;cursor:pointer;text-align:left;
  transition:all .15s;font-family:'EB Garamond',serif;
}
.activity-btn:hover{background:var(--parchment3);border-color:var(--gold);transform:translateY(-1px)}
.activity-btn.used{opacity:.5;pointer-events:none}
.act-icon{font-size:20px;display:block;margin-bottom:4px}
.act-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);display:block;margin-bottom:2px}
.act-desc{font-size:13px;color:var(--ink3);line-height:1.4}

/* ── BADGES ── */
.badge{display:inline-block;font-family:'Cinzel',serif;font-size:10px;font-weight:500;padding:2px 9px;border-radius:2px;letter-spacing:.05em}
.badge-gryf{background:var(--gryf);color:#ffd700}
.badge-slyth{background:var(--slyth);color:#c0c0c0}
.badge-raven{background:var(--raven);color:#c0a060}
.badge-huff{background:var(--huff);color:#ffd700}
.badge-dark{background:#2a1f30;color:#c0a0d0}
.badge-good{background:#1a3a1a;color:#80d080}

/* ── LOG ── */
.log-panel{border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:1rem}
.log-header{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);padding:.4rem .85rem;background:var(--parchment2);border-bottom:1px solid var(--border)}
.log-entry{padding:6px .85rem;border-bottom:1px solid var(--border);display:flex;gap:10px;font-size:13px;color:var(--ink2);line-height:1.5}
.log-entry:last-child{border-bottom:none}
.log-age{font-family:'Cinzel',serif;font-size:10px;color:var(--ink3);flex-shrink:0;padding-top:1px;min-width:40px}

/* ── NOTIFICATION ── */
.notif{
  position:fixed;top:1rem;right:1rem;z-index:999;
  background:var(--ink);color:var(--parchment);
  border:1px solid var(--gold);border-radius:4px;
  padding:.6rem 1rem;font-family:'EB Garamond',serif;font-size:14px;
  max-width:260px;line-height:1.5;
  animation:slideIn .3s ease,fadeOut .3s ease 2.7s forwards;
  pointer-events:none;
}
@keyframes slideIn{from{transform:translateX(120%)}to{transform:none}}
@keyframes fadeOut{to{opacity:0;transform:translateX(120%)}}

/* ── PROGRESS ── */
.prog-bar{display:flex;gap:3px;margin-bottom:1.25rem}
.prog-seg{height:3px;flex:1;background:var(--parchment3);border-radius:2px}
.prog-seg.done{background:var(--gold)}
.prog-seg.cur{background:var(--gold3)}

/* ── SPELLS ── */
.spell-list{display:flex;flex-wrap:wrap;gap:5px;margin:.5rem 0}
.spell{background:var(--parchment3);border:1px solid var(--border2);border-radius:20px;padding:2px 10px;font-size:12px;font-style:italic;color:var(--ink2)}

/* ── REVEAL ── */
.reveal-box{text-align:center;padding:1.5rem 1rem;margin:1rem 0}
.reveal-big{font-family:'Cinzel',serif;font-size:40px;font-weight:600;color:var(--ink);display:block;margin:.5rem 0}
.reveal-sub{font-size:16px;font-style:italic;color:var(--ink3)}

/* ── SCORE ── */
.score-ring{text-align:center;padding:1.5rem 0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.score-num{font-family:'Cinzel',serif;font-size:72px;font-weight:700;color:var(--ink);display:block;line-height:1}
.score-title{font-size:17px;font-style:italic;color:var(--ink2);margin:.5rem 0 1rem}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
.italic{font-style:italic}
.gold-text{color:var(--gold)}
.small{font-size:13px;color:var(--ink3)}
.center{text-align:center}
.tag{display:inline-block;font-family:'Cinzel',serif;font-size:10px;padding:2px 8px;border-radius:2px;margin:2px}
.tag-good{background:#d4edda;color:#155724}
.tag-bad{background:#f8d7da;color:#721c24}
.tag-neutral{background:var(--parchment3);color:var(--ink3)}
.action-result{
  background:var(--parchment2);border:1px solid var(--border);border-left:3px solid var(--gold2);
  border-radius:0 3px 3px 0;padding:.65rem 1rem;margin:.75rem 0;
  font-size:14px;line-height:1.65;color:var(--ink2);
}

/* ── WAND ── */
.wand-opt{background:var(--parchment2);border:1px solid var(--border);border-radius:3px;padding:.7rem;margin-bottom:5px;cursor:pointer;transition:all .12s;width:100%;text-align:left;font-family:'EB Garamond',serif}
.wand-opt:hover{background:var(--parchment3);border-color:var(--gold)}
.wand-name{font-family:'Cinzel',serif;font-size:11px;font-weight:600;color:var(--gold);display:block;margin-bottom:2px}
.wand-desc{font-size:13px;color:var(--ink2);line-height:1.45}

/* mobile */
@media(max-width:500px){
  .activity-grid{grid-template-columns:1fr}
  .rel-grid{grid-template-columns:1fr 1fr}
  .hud{grid-template-columns:1fr}
  .page{padding:1.5rem 1.25rem}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
const $ = id => document.getElementById(id);
const app = () => $('app');
const rnd = arr => arr[Math.floor(Math.random()*arr.length)];
const cl = (v,mn,mx) => Math.min(mx,Math.max(mn,Math.round(v)));

function render(html){ app().innerHTML = html; window.scrollTo(0,0); }

/* ===== GAME STATE ===== */
let G = {};

function initGame(){
  G = {
    age: 0, year: 0,
    stats:{courage:35,wisdom:22,magic:30,cunning:18,loyalty:32,reputation:20,quidditch:25,academic:20},
    rel:{ron:0,hermione:0,neville:0,ginny:0,luna:0,cho:0,fred:0,george:0,hagrid:40,dumbledore:30,snape:-20,draco:-30,sirius:0,cedric:0,dobby:10,voldemort:-100},
    romance:null,romanceLevel:0,
    spells:['Wingardium Leviosa','Lumos'],
    log:[],
    housePoints:0,
    dark:0,good:0,
    freeActions:3,freeUsed:0,
    horcruxes:0,
    quidditch:true,
    quidditchWins:0,
    patronus:'Stag',
    deluminator:false,
    phase:'intro',
    sceneQ:[],
    year1events:{potions:false,troll:false,stone:false},
    detentions:0,
    duelWins:0,
    obedient:false,
    daActive:false,
    owlGrades:{},
  };
}

/* ===== HELPERS ===== */
function mut(obj){
  for(const[k,v]of Object.entries(obj)){
    if(G.stats[k]!==undefined) G.stats[k]=cl(G.stats[k]+v,0,100);
    else if(G.rel[k]!==undefined) G.rel[k]=cl(G.rel[k]+v,-100,100);
  }
}

function addLog(age,txt){ G.log.unshift({age,txt}); }

function notify(msg,dur=3000){
  const n=document.createElement('div');
  n.className='notif'; n.innerHTML=msg;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),dur+300);
}

function relHeart(v){
  if(v<-50) return '<span style="color:#c00">✦✦ Enemy</span>';
  if(v<-20) return '<span style="color:#c00">✦ Rival</span>';
  if(v<10)  return '<span style="color:#888">◇ Acquaintance</span>';
  if(v<30)  return '<span style="color:#888">◆ Friendly</span>';
  if(v<55)  return '<span style="color:var(--gold)">♥ Friend</span>';
  if(v<75)  return '<span style="color:var(--gold)">♥♥ Close</span>';
  if(v<90)  return '<span style="color:var(--gold)">♥♥♥ Best Friend</span>';
  return '<span style="color:#d4305a">♥♥♥♥ Beloved</span>';
}

function relPanel(chars){
  const names={ron:'Ron Weasley',hermione:'Hermione Granger',neville:'Neville Longbottom',ginny:'Ginny Weasley',luna:'Luna Lovegood',cho:'Cho Chang',fred:'Fred Weasley',george:'George Weasley',hagrid:'Hagrid',dumbledore:'Dumbledore',snape:'Snape',draco:'Draco Malfoy',sirius:'Sirius Black',cedric:'Cedric Diggory',dobby:'Dobby'};
  const show=chars||Object.keys(G.rel).filter(k=>k!=='voldemort'&&(Math.abs(G.rel[k])>5||['ron','hermione','hagrid','dumbledore'].includes(k)));
  return `<div class="rel-panel">
    <div class="eyebrow" style="margin-bottom:.5rem">Relationships</div>
    <div class="rel-grid">${show.map(k=>`
      <div class="rel-card">
        <div class="rel-name">${names[k]||k}</div>
        <div class="rel-status">${relHeart(G.rel[k])}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function statBars(){
  const cols={courage:'#8b1a1a',wisdom:'#1a2a4a',magic:'#4a1a6a',cunning:'#1a4a2e',loyalty:'#b8860b',quidditch:'#c05000',academic:'#1a3a5a'};
  return Object.entries(G.stats).filter(([k])=>k!=='reputation').map(([k,v])=>`
    <div class="stat-row">
      <span class="stat-name">${k.charAt(0).toUpperCase()+k.slice(1)}</span>
      <div class="stat-track"><div class="stat-fill" style="width:${v}%;background:${cols[k]||'#888'}"></div></div>
      <span class="stat-val">${v}</span>
    </div>`).join('');
}

function hud(){
  return `<div class="hud">
    <div class="hud-section">
      <div class="hud-label">Harry Potter — Year ${G.year}, Age ${G.age}</div>
      ${statBars()}
    </div>
    <div class="hud-section">
      <div class="hud-label">Status</div>
      <div style="font-size:12px;color:#c0a080;line-height:1.9">
        <span class="badge badge-gryf">Gryffindor</span><br>
        🦅 Seeker · ${G.quidditchWins} wins<br>
        ✦ House pts: ${G.housePoints}<br>
        ${G.patronus?`🌟 Patronus: ${G.patronus}`:''}
        ${G.romance?`<br>💗 ${G.romance==='cho'?'Cho Chang':'Ginny Weasley'}`:''}
      </div>
      <div class="hud-label" style="margin-top:.5rem">Spells Known</div>
      <div class="spell-list">${G.spells.map(s=>`<span class="spell">${s}</span>`).join('')}</div>
    </div>
  </div>`;
}

function logPanel(max){
  if(!G.log.length)return'';
  return`<div class="log-panel">
    <div class="log-header">The Chronicles of Harry Potter</div>
    ${G.log.slice(0,max||6).map(e=>`<div class="log-entry"><span class="log-age">Age ${e.age}</span><span>${e.txt}</span></div>`).join('')}
  </div>`;
}

function prog(cur,tot){
  return`<div class="prog-bar">${Array.from({length:tot},(_,i)=>`<div class="prog-seg ${i<cur?'done':i===cur?'cur':''}"></div>`).join('')}</div>`;
}

function page(eyebrow,title,body){
  render(`<div class="page">
    <div class="eyebrow">${eyebrow}</div>
    <div class="title">${title}</div>
    ${body}
  </div>`);
}

function dlg(speaker,text){
  return`<div class="dialogue"><span class="speaker">${speaker}</span>${text}</div>`;
}

function ch(arr,fn,q){
  return`${q?`<div class="q-label">Your choice</div><p class="question">${q}</p>`:''}
  <div class="choices">${arr.map((c,i)=>`
    <button class="choice" onclick="${fn}(${i})">
      <span class="choice-letter">${String.fromCharCode(65+i)}</span>${c}
    </button>`).join('')}
  </div>`;
}

/* ===== FREE TIME ===== */
function freeTime(nextFn, yearNum){
  G.freeUsed=0;
  const actions=3;
  renderFreeTime(nextFn,yearNum,actions);
}

function renderFreeTime(nextFn,yearNum,total){
  const remaining=total-G.freeUsed;

  const activities=[
    {id:'ron',icon:'🎮',name:'Hang out with Ron',desc:'Chess, Exploding Snap, or Quidditch talk.',
     fn:()=>{mut({ron:15,loyalty:5});addLog(G.age,'Spent the afternoon with Ron. You beat him at Exploding Snap — barely.');notify('♥ Ron is delighted!');}},
    {id:'hermione',icon:'📚',name:'Study with Hermione',desc:'She drills you on spells and theory.',
     fn:()=>{mut({hermione:12,academic:8,wisdom:5});addLog(G.age,'Hermione corrected your wand grip for forty minutes. Your grades quietly improved.');notify('📚 Academic +8, Hermione +12');}},
    {id:'hagrid',icon:'🫖',name:'Visit Hagrid',desc:'Tea, treacle fudge, and questionable creatures.',
     fn:()=>{mut({hagrid:10,courage:3,loyalty:4});addLog(G.age,'Hagrid showed you something that was almost certainly illegal. You had an excellent afternoon.');notify('♥ Hagrid loves the company!');}},
    {id:'quidditch',icon:'🧹',name:'Quidditch practice',desc:'Extra laps, Snitch drills, conditioning.',
     fn:()=>{mut({quidditch:10,courage:5});addLog(G.age,'Stayed late on the pitch practising. Wood gave you a reluctant nod of approval.');notify('🧹 Quidditch +10');}},
    {id:'explore',icon:'🗺️',name:'Explore the castle',desc:'Discover hidden rooms, secret passages.',
     fn:()=>{
       const finds=['You found a shortcut behind the one-eyed witch hump.','You discovered a room full of chamber pots on the fifth floor. Useful, somehow.','A portrait of a particularly grumpy alchemist told you something interesting about Alchemy.','You found a mirror that shows the same room from a slightly different angle. Odd.'];
       mut({cunning:7,wisdom:5,magic:3});addLog(G.age,rnd(finds));notify('🗺️ Cunning +7, discovered something!');}},
    {id:'library',icon:'📖',name:'Research in the library',desc:'Pore over restricted and unrestricted sections.',
     fn:()=>{mut({academic:10,wisdom:8});
       const sp=['Alohomora','Accio','Reparo','Episkey','Finite Incantatem'];
       const learn=sp.filter(s=>!G.spells.includes(s));
       if(learn.length){const s=learn[0];G.spells.push(s);notify(`✨ Learned: ${s}`);}
       else notify('📖 Wisdom +8, Academic +10');
       addLog(G.age,'Spent hours in the library. Madam Pince asked you to stop breathing so loudly.');}},
    {id:'duel',icon:'⚡',name:'Practice duelling',desc:'Find a willing partner and work on combat spells.',
     fn:()=>{mut({magic:8,courage:7});G.duelWins++;addLog(G.age,`Duelling practice. You won ${G.duelWins} out of ${G.duelWins} practice bouts against Neville.`);notify('⚡ Magic +8, Courage +7');}},
    {id:'ginny',icon:'💐',name:'Talk to Ginny',desc:'She is funnier and braver than you expected.',
     fn:()=>{mut({ginny:18,loyalty:4});addLog(G.age,'Had a long conversation with Ginny. She makes you laugh more than most people.');notify('💗 Ginny +18');}},
    {id:'neville',icon:'🌿',name:'Help Neville in Herbology',desc:'He is better at this than anyone credits him.',
     fn:()=>{mut({neville:15,loyalty:6,academic:4});addLog(G.age,'Helped Neville repot Mandrakes. He is extraordinarily patient and secretly brilliant.');notify('♥ Neville +15');}},
    {id:'write',icon:'✉️',name:'Write to Sirius',desc:'Letters by owl. He always writes back.',
     fn:()=>{mut({sirius:cl(G.rel.sirius+0,0,100)>0?10:15,courage:4});G.rel.sirius=cl(G.rel.sirius+15,-100,100);addLog(G.age,'Wrote to Sirius. His reply arrived smelling of bonfires and was exactly what you needed to hear.');notify('✉️ Sirius +15');}},
    {id:'fred',icon:'🎆',name:'Test Fred & George\'s products',desc:'Weasleys\' Wizard Wheezes in progress.',
     fn:()=>{mut({fred:12,george:12,cunning:5,courage:3});addLog(G.age,'Fred and George needed a test subject. You obliged. The results were spectacular and slightly alarming.');notify('💣 Fred +12, George +12');}},
    {id:'luna',icon:'🌙',name:'Walk with Luna',desc:'She sees things that others miss entirely.',
     fn:()=>{mut({luna:15,wisdom:8});addLog(G.age,'Walked with Luna. She said something that made no sense and then turned out to be completely true.');notify('🌙 Luna +15, Wisdom +8');}},
  ];

  // Filter relevant activities by year
  const avail=activities.filter(a=>{
    if(a.id==='sirius'&&G.rel.sirius===-100)return false;
    if(a.id==='luna'&&G.year<5)return false;
    if(a.id==='write'&&G.year<3)return false;
    return true;
  }).slice(0,8);

  const usedIds=G._ftUsed||[];

  page(`Year ${G.year} — Free Time`,`What do you do with your time?`,
    `${hud()}
    <p class="prose">Between the major events of the year, there is time — not unlimited, but real. <strong>${remaining} action${remaining===1?'':'s'} remaining</strong> before the next chapter begins.</p>
    <div class="activity-grid">
    ${avail.map(a=>`
      <button class="activity-btn ${usedIds.includes(a.id)?'used':''}" onclick="doActivity('${a.id}','${nextFn}',${yearNum})">
        <span class="act-icon">${a.icon}</span>
        <span class="act-name">${a.name}</span>
        <span class="act-desc">${a.desc}</span>
      </button>`).join('')}
    </div>
    ${remaining===0?`<button class="btn btn-wide" onclick="${nextFn}()">Continue the story →</button>`:''}
    ${logPanel(4)}`
  );
}

function doActivity(id,nextFn,yearNum){
  if(!G._ftUsed)G._ftUsed=[];
  if(G._ftUsed.includes(id))return;
  G._ftUsed.push(id);
  G.freeUsed++;

  const total=3;
  const activities={
    ron:()=>{mut({ron:15,loyalty:5});addLog(G.age,'Spent the afternoon with Ron. Beat him at Exploding Snap — barely.');notify('♥ Ron +15')},
    hermione:()=>{mut({hermione:12,academic:8,wisdom:5});addLog(G.age,'Hermione corrected your wand grip for forty minutes. Your grades quietly improved.');notify('📚 Academic +8')},
    hagrid:()=>{mut({hagrid:10,courage:3,loyalty:4});addLog(G.age,'Hagrid showed you something probably illegal. Excellent afternoon.');notify('♥ Hagrid +10')},
    quidditch:()=>{mut({quidditch:10,courage:5});addLog(G.age,'Extra Quidditch practice. Wood gave you a reluctant nod.');notify('🧹 Quidditch +10')},
    explore:()=>{const f=['Found a shortcut behind the one-eyed witch.','A secret room on the fifth floor. Suspicious.','An alchemist portrait told you something useful.','A mirror that shows a slightly different room.'];mut({cunning:7,wisdom:5});addLog(G.age,rnd(f));notify('🗺️ Cunning +7')},
    library:()=>{mut({academic:10,wisdom:8});const sp=['Alohomora','Accio','Reparo','Episkey','Finite Incantatem','Protego','Reducto'];const learn=sp.filter(s=>!G.spells.includes(s));if(learn.length){G.spells.push(learn[0]);notify(`✨ Learned: ${learn[0]}`);}else notify('📖 Wisdom +8');addLog(G.age,'Hours in the library. Madam Pince asked you to stop breathing so loudly.')},
    duel:()=>{mut({magic:8,courage:7});G.duelWins++;addLog(G.age,`Duelling practice. ${G.duelWins} wins.`);notify('⚡ Magic +8')},
    ginny:()=>{mut({ginny:18,loyalty:4});addLog(G.age,'Long conversation with Ginny. She makes you laugh more than most people.');notify('💗 Ginny +18')},
    neville:()=>{mut({neville:15,loyalty:6,academic:4});addLog(G.age,'Helped Neville with Mandrakes. He is secretly brilliant.');notify('♥ Neville +15')},
    write:()=>{G.rel.sirius=cl(G.rel.sirius+15,-100,100);addLog(G.age,'Wrote to Sirius. His reply smelled of bonfires and said exactly the right thing.');notify('✉️ Sirius +15')},
    fred:()=>{mut({fred:12,george:12,cunning:5});addLog(G.age,'Tested Weasley products. Spectacular and alarming.');notify('💣 Fred +12, George +12')},
    luna:()=>{mut({luna:15,wisdom:8});addLog(G.age,'Luna said something that made no sense and turned out to be true.');notify('🌙 Luna +15')},
  };

  if(activities[id])activities[id]();

  const remaining=total-G.freeUsed;
  renderFreeTime(nextFn,yearNum,total);
}

    ${ch([
      '"Tom Riddle." You used his real name. He flinched. "Let\'s end this."',
      '"You\'re too late. The last Horcrux is dead. You\'re already mortal." Let him understand what had happened.',
      '"You never understood love. That\'s why you lost. Then. Now. Always." You looked at him and meant it.',
      '"Try it again. The Killing Curse. See what happens when you try to kill someone who died for them." Gestured at the hall.',
    ],'chooseFinalDuel','Harry\'s final words to Voldemort:')}`)
}

function chooseFinalDuel(i){
  const d=[
    {stats:{courage:22,wisdom:10,magic:12},log:'The last duel: "Tom Riddle." The real name. He flinched. EXPELLIARMUS.'},
    {stats:{courage:18,wisdom:14,magic:12},log:'The last duel: told him the truth about what had already happened. EXPELLIARMUS.'},
    {stats:{courage:20,wisdom:12,loyalty:10,magic:12},log:'The last duel: "You never understood love." He never did. EXPELLIARMUS.'},
    {stats:{courage:18,wisdom:10,loyalty:14,magic:12},log:'The last duel: offered him the full understanding of why it was already over. EXPELLIARMUS.'},
  ];
  mut(d[i].stats);
  addLog(17,d[i].log);
  G.good+=3;
  G.horcruxes=7;
  phaseVictory();
}

function phaseVictory(){
  page('Year Seven — The Ending','After',
    `<p class="prose">The Elder Wand flew out of Voldemort's hand. His own Killing Curse rebounded and killed him — finally, completely, the last Horcrux destroyed, nowhere to go, the soul fragment returned to nothing.</p>
    <p class="prose">The silence that followed was the loudest thing you had ever heard.</p>
    <p class="prose">Then: noise. Ron and Hermione. Mrs Weasley. Ginny running toward you through the crowd and you catching her and holding on. Hagrid crying somewhere in the middle distance. The castle, damaged but standing, the morning light coming through holes in the walls.</p>
    ${dlg('Ron Weasley','"Oi. You\'re alive." He looked you up and down. "You absolute—" He hugged you instead of finishing the sentence.')}
    ${ch([
      'You held Ginny for a long time. Long enough that people around you understood this was a reunion and gave you the space for it.',
      'You sat down on the floor of the Great Hall because your legs stopped working, and Ron and Hermione sat down beside you, and nobody spoke for a while.',
      'You went to find Neville immediately. You needed to say what had to be said about what he\'d done.',
      'You went to tell George about Fred. There was no right way to do it. You did it anyway because someone who loved Fred had to.',
    ],'chooseVictory','What does Harry do in the first minutes after?')}`)
}

function chooseVictory(i){
  const d=[
    {stats:{ginny:15,loyalty:14,romance:15},good:1,log:'After the battle: held Ginny. Long enough for people to understand. The morning came through the broken walls.'},
    {stats:{ron:15,hermione:12,loyalty:16},good:1,log:'After the battle: sat down. Ron and Hermione sat beside you. No one spoke for a while.'},
    {stats:{neville:20,loyalty:14,courage:8},good:1,log:'After the battle: found Neville first. Said what needed to be said.'},
    {stats:{fred:0,george:15,loyalty:16,courage:14},good:1,log:'After the battle: went to tell George about Fred. No right way. You did it anyway.'},
  ];
  mut(d[i].stats);
  addLog(17,d[i].log);
  G.good+=(d[i].good||0);
  phaseEpilogue();
}

/* ===== EPILOGUE ===== */
function phaseEpilogue(){
  G.age=37;
  page('Epilogue — Nineteen Years Later','King\'s Cross. Platform Nine and Three-Quarters.',
    `<p class="prose">The steam. The scarlet engine. Your three children — James Sirius, Albus Severus, Lily Luna — at the edge of the platform. Ginny beside you, her hair in the autumn light. The same platform. A different kind of heart.</p>
    ${dlg('Albus Potter','"Dad? What if I\'m put in Slytherin?"')}
    ${ch([
      '"Then Slytherin will have someone brave and kind in it, which it could use." He looked uncertain. "The hat takes your choice into account."',
      '"Then you\'ll be the best Slytherin since Merlin." He laughed despite himself.',
      '"Albus Severus. You were named for two headmasters of Hogwarts. One of them was a Slytherin. He was probably the bravest man I ever knew." He went quiet.',
      '"The bravest man I ever knew was a Slytherin. If you end up there, you\'re in good company." He held onto that.',
    ],'chooseEpilogue','What does Harry say to Albus?')}`)
}

function chooseEpilogue(i){
  const d=[
    {stats:{wisdom:10,loyalty:8},log:'Nineteen years later: "The hat takes your choice." Albus boarded the train looking less afraid.'},
    {stats:{courage:8,loyalty:8},log:'Nineteen years later: made Albus laugh. He boarded the train.'},
    {stats:{wisdom:14,loyalty:10,courage:8},log:'Nineteen years later: told Albus about Severus Snape. He went quiet. He understood.'},
    {stats:{wisdom:12,courage:8,loyalty:10},log:'Nineteen years later: "In good company." Albus held onto that.'},
  ];
  mut(d[i].stats);
  addLog(37,d[i].log);
  G.good++;
  phaseFinalScore();
}

function phaseFinalScore(){
  const s=G.stats;
  const total=Object.values(s).reduce((a,b)=>a+b,0);
  const score=cl(Math.round(total/8+G.good*2.5+G.romanceLevel*0.3+G.quidditchWins*2),0,100);
  const spellBonus=G.spells.length*2;
  const finalScore=cl(score+spellBonus,0,100);

  const titles=[
    [95,'The Chosen One — a name that became a truth rather than a prophecy'],
    [85,'A legend of the wizarding world. The Boy Who Lived, and lived well.'],
    [75,'One of the finest wizards of his generation. The scar was never the whole story.'],
    [63,'A good and brave wizard who gave more than he was asked for.'],
    [50,'A survivor who found his way through the darkness to something worth protecting.'],
    [0,'Someone who got through it. That is not nothing. That is, in fact, quite a lot.'],
  ];
  const title=titles.find(([min])=>finalScore>=min)[1];

  const relSummary=Object.entries({
    'Ron Weasley':G.rel.ron,'Hermione Granger':G.rel.hermione,
    'Ginny Weasley':G.rel.ginny,'Neville Longbottom':G.rel.neville,
    'Hagrid':G.rel.hagrid,'Dobby':G.rel.dobby,
  }).map(([n,v])=>`<div class="log-entry"><span class="log-age" style="min-width:140px">${n}</span><span>${relHeart(v)}</span></div>`).join('');

  render(`<div class="page">
    <div class="eyebrow">The End</div>
    <div class="title">The Life of Harry James Potter</div>

    <div class="score-ring">
      <span class="score-num">${finalScore}</span>
      <p class="score-title italic">${title}</p>
      <span class="badge badge-gryf" style="font-size:12px">Gryffindor · Class of 1998</span>
      ${G.romance?`<span class="badge" style="background:#5a1a2a;color:#ffb0c0;margin-left:6px">♥ Married Ginny Weasley</span>`:''}
    </div>

    <p class="prose">The entry in <em>Hogwarts: A History,</em> revised edition, runs to twenty-two pages. They got the scar right. They got the eyes — <em>green, his mother's green</em> — right. They got the wand right: <em>holly, phoenix feather, eleven inches, nice and supple.</em></p>
    <p class="prose">What they did not entirely capture was the particular way he listened to people, the way he never seemed to know when he was being brave, the way he was always slightly late to understand that people loved him and then seemed genuinely surprised by it each time.</p>
    <p class="prose">He named his children for the people who had cost him the most. He wore the scar for eighty years and never called it a mark of suffering.</p>
    <p class="prose italic" style="text-align:center;color:var(--gold)">"The scar had not pained Harry for nineteen years. All was well."</p>

    <hr class="divider">

    <div class="hud" style="margin-bottom:1rem">${statBars()}</div>

    <div class="eyebrow" style="margin-bottom:.5rem">Relationships</div>
    <div class="log-panel" style="margin-bottom:1rem">
      <div class="log-header">People Harry loved</div>
      ${relSummary}
    </div>

    <div class="log-panel" style="margin-bottom:1rem">
      <div class="log-header">Spells known (${G.spells.length})</div>
      <div style="padding:.75rem;display:flex;flex-wrap:wrap;gap:5px">${G.spells.map(s=>`<span class="spell">${s}</span>`).join('')}</div>
    </div>

    ${logPanel(20)}

    <button class="btn btn-wide" onclick="restartGame()">✦ Live another life ✦</button>
  </div>`);
}

function restartGame(){
  initGame();
  phaseIntro();
}

/* ===== START ===== */
initGame();
phaseIntro();
</script>
